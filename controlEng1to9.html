  {
    "title": "Introduction",
    "title_html": "Introduction",
    "items_html": "<div class=\"slide-item\"><i>Stability</i>: a very important issue in a control system</div>\n<div class=\"slide-item level-1\">Transfer function/characteristic equation: Routh-Hurwitz</div>\n<div class=\"slide-item level-1\">Frequency response: Nyquist</div>\n<div class=\"slide-item\">Nyquist stability criterion is based on Cauchy&#x27;s theorem which is concerned with the mapping contours in the complex <span class=\"math\">s</span>-plane.</div>\n<div class=\"slide-item\">To ensure stability, we must ascertain that all the zeros of the characteristic equation <span class=\"math\">F(s)=1+L(s)</span> lie in the left-hand <span class=\"math\">s</span>-plane.</div>\n<div class=\"slide-item\">Nyquist criterion: a mapping of the right-hand <span class=\"math\">s</span>-plane into the <span class=\"math\">F(s)</span>-plane (through the polar plot of <span class=\"math\">L(s))</span>.</div>",
    "items_count": 6,
    "notes": "稳定是控制系统里需要考虑的首要事项。前面讲过的劳斯赫尔维茨判据是根据系统的特征方程来判定系统稳定性的。本章将介绍基于频率响应判定系统稳定性的方法，也就是乃氏稳定判据。乃氏稳定判据依据的是复变函数理论中的柯西定理，该定理关心的是复平面上的围线映射。我们知道，为保证系统稳定，必须确保闭环系统特征方程的所有零点均在复平面的左半平面。乃氏判据是将整个复平面的右半平面映射到特征方程构成的复平面上，具体是通过开环传递函数的极点来判定的。在没有理解乃氏判据前理解这段论述显然是比较困难的，我们可以在学完本章相关内容后再回过头来看这段表述。"
  },
  {
    "title": "Mapping Contour in the s-Plane",
    "title_html": "Mapping Contour in the s-Plane",
    "items_html": "<div class=\"slide-item\">A contour map is a trajectory in one plane mapped into another plane by a relation <span class=\"math\">F(s)</span>.</div>\n<div class=\"slide-item level-1\">Note: from complex number to complex number</div>\n<div class=\"slide-item\"><span class=\"math\">s</span>-plane <span class=\"math-block\">s=\\sigma+j\\omega</span></div>\n<div class=\"slide-item\"><span class=\"math\">F(s)</span> - plane <span class=\"math-block\">F(s)=u+jv</span></div>",
    "items_count": 4,
    "notes": "围线映射是指利用复变函数将一个复平面上的闭合曲线或轨迹映射到另一个平面上，相当于由一个复数经复变函数变成了另一个复数，在s平面上某一复数具有一定的位置，该点映射到新的复平面后，会有对应的点与其映射，它们之间是一一对应的关系，在s平面内一系列点构成的轨迹也会在F s平面上有对应的映射曲线，这就是映射围线。我们可以通过一系列例子进行说明。"
  },
  {
    "title": "An Example of Contour Mapping",
    "title_html": "An Example of Contour Mapping",
    "items_html": "<div class=\"slide-item\">Consider <span class=\"math\">F(s)=2s+1</span>.</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">s=\\sigma+j\\omega  \\longrightarrow  F(s)=(2\\sigma+1)+j2\\omega</span></div>\n<div class=\"slide-item\">This is a conformal mapping as it retains the angles of the splane contour on the <span class=\"math\">F(s)</span>-plane.</div>\n<div class=\"slide-item\">A closed contoutr in the <span class=\"math\">s</span>-plane results in a closed contour in the <span class=\"math\">F(s)</span>-plane.</div>\n<div class=\"slide-img\"><img src=\"images/img_138.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_139.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "比如有这样一个复变函数F s，在s平面上是围绕原心、边长为二的正方形，映射到F s平面后仍然是一个正方形，只是边长变成原来的两倍，并且不再围绕原心对称，而是向右偏移了一个单位。我们可以看出，这个例子当中的封闭围线映射后仍为封闭围线，且方向没有发生没变。"
  },
  {
    "title": "Another Example of Contour Mapping",
    "title_html": "Another Example of Contour Mapping",
    "items_html": "<div class=\"slide-item\">Consider <span class=\"math\">\\displaystyle F(s)=\\frac{s}{s+2}</span></div>\n<div class=\"slide-item\">The contour encloses one zero in the <span class=\"math\">s</span>-plane.</div>\n<div class=\"slide-item\">The contour in the <span class=\"math\">F(s)</span>-plane encloses the origin of the <span class=\"math\">F(s)</span>-plane.</div>\n<div class=\"slide-img\"><img src=\"images/img_140.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_141.png\" alt=\"\"></div>",
    "items_count": 5,
    "notes": "另一个例子。复变函数的形式相比前一个例子复杂了一些，但仍为有理分式。s平面上的围线仍为围线原心、边长为二的正方形，这里我们注意到，该复变函数有一个零点、一个极点，而且围线包围了复变函数的零点，但不包围其极点，在F s平面上的映射围线仍然包围原点，且围线方向没有发生改变。"
  },
  {
    "title": "Yet Another Example of Contour Mapping",
    "title_html": "Yet Another Example of Contour Mapping",
    "items_html": "<div class=\"slide-item\">Consider <span class=\"math\">\\displaystyle F(s)=\\frac{s}{s+1/2}</span></div>\n<div class=\"slide-item\">The contour in the <span class=\"math\">s</span>-plane encloses one zero and one pole</div>\n<div class=\"slide-item\">The origin in the <span class=\"math\">F(s)</span>-plane is no longer enclosed by the contour.</div>\n<div class=\"slide-item\">Note also the traversal direction of the contour</div>\n<div class=\"slide-img\"><img src=\"images/img_142.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_143.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "再举一个例子，这个例子与上一个相似，只是复变函数的零点、极点都被包围在s平面的正方形围线里，导致在F s平面上的映射围线不再包围原心，而且围线方向与原先围线方向相反，变成了逆时针。我们举的三个例子中，原围线与映射围线之间的关系与复变函数的零、极点分布密切相关，由此我们可以总结出柯西定理。"
  },
  {
    "title": "Cauchy's Theorem",
    "title_html": "Cauchy&#x27;s Theorem",
    "items_html": "<div class=\"slide-item\"><em>Cauchy&#x27;s theorem</em> is concerned with mapping a function <span class=\"math\">F(s)</span> that has a finite number of poles and zeros within the contour.</div>\n<div class=\"slide-item\">The theorem (principle of the argument，幅角定理) states</div>\n<div class=\"slide-item level-1\">If a contour <span class=\"math\">\\Gamma_s</span> in the <span class=\"math\">s</span>-plane encircles <span class=\"math\">Z</span> zeros and <span class=\"math\">P</span> poles of <span class=\"math\">F(s)</span> and does not pass through any poles or zeros of <span class=\"math\">F(s)</span> and the traversal is in the clockwise direction along the contour, the corresponding contour <span class=\"math\">\\Gamma_F</span> in the <span class=\"math\">F(s)</span>-plane encircles the origin of the <span class=\"math\">F(s)</span>-plane <span class=\"math\">N=Z -P</span> times in the clockwise direction</div>\n<div class=\"slide-item\">Check the theorem</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned} F(s) &amp; = 2s+1 \\rightarrow Z=1,\\ P=0,\\ {\\rm and}\\ N=1\\\\\nF(s) &amp; = \\frac{s}{s+2} \\rightarrow Z=1,\\ P=0,\\ {\\rm and}\\ N=1\\\\\nF(s) &amp; = \\frac{s}{s+1/2} \\rightarrow Z=1,\\ P=1,\\ {\\rm and}\\ N=0 \\end{aligned}</span></div>",
    "items_count": 5,
    "notes": "柯西定理关注的映射是，在s平面闭合曲线内具有限个零点、极点的复变函数对原闭合曲线的映射情形，这种映射行为可以用定理表述为：如果闭合曲线以顺时针方向为正在s平面上包围了F s函数的Z个零点和P个极点，但不经过任何一个零点或极点，那么对应的映射曲线也以顺时针方向为正在F s平面上包围原点的圈数或周数为Z减P。根据这一定理，我们可以检验一下前面所举的三个例子。第一个例子，s平面的围线包围F s的一个零点，而没有极点，所以N为一，所以映射围线顺时针包围原点1圈；第二个例子，包围一个零点，但不包围极点，所以与第一个例子相同；第三个例子，包围一个零点、一个极点，所以N为零，即映射围线不包围原点。"
  },
  {
    "title": "Explanation of the Cauchy's Theorem",
    "title_html": "Explanation of the Cauchy&#x27;s Theorem",
    "items_html": "<div class=\"slide-item\"><i>Cauchy&#x27;s theorem</i>: comprehended by considering <span class=\"math\">F(s)</span> in terms of angle due to each pole and zero as the contour <span class=\"math\">\\Gamma_s</span> is traversed in a clockwise direction.</div>\n<div class=\"slide-item\">Consider</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">F(s)=\\frac{(s+z_1)(s+z_2)}{(s+p_1)(s+p_2)}</span></div>\n<div class=\"slide-item\">The angle is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned}\n\\angle F(s) &amp; = \\angle(s+z_1)+\\angle(s+z_2)-\\angle(s+p_1)-\\angle(s+p_2)\\\\\n&amp; = \\phi_{z1}+\\phi_{z2}-\\phi_{p1}-\\phi_{p2}\n\\end{aligned}</span></div>\n<div class=\"slide-item\">The net angle increase of <span class=\"math\">\\Gamma_F</span> of the contour in the <span class=\"math\">F(s)</span>-plane is <span class=\"math\">\\phi_F=\\phi_Z-\\phi_P</span> or <span class=\"math\">2\\pi N=2\\pi Z-2\\pi P</span></div>\n<div class=\"slide-img\"><img src=\"images/img_144.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_145.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "s平面上某闭合曲线上的一点沿着该曲线顺时针移动时，由于零点和极点的影响，对应的在F s平面上的映射点与原点构成向量的相角会发生不同的变化，仔细观察这种变化可以帮助我们更好地理解柯西定理。比如，我们考虑传递函数，分别具有两个零点、两个极点，显然相角的表达式可以写成角F s，代表的意义可以表述为，s平面上F s的零点和极点指向被研究点的四个向量对应相角的代数和差，零点构成的向量相角取正，极点构成的向量相角取负。如果F s的零点和极点在s平面上均被某一围线包围，该围线上某点沿围线顺时针方向运动一周时，零、极点到该点构成的向量均将旋转二派角度，所以在F s平面上对应的映射点将围线原点运动Z减P周，Z代表s平面上F s函数零点的数目，P代表极点的数目，如果Z减P为正，表明运动方向与s平面上围线运动方向一致，否则相反。"
  },
  {
    "title": "Two Additional Examples",
    "title_html": "Two Additional Examples",
    "items_html": "<div class=\"slide-item\">three zeros and one pole</div>\n<div class=\"slide-item level-1\"><span class=\"math\">Z=3</span></div>\n<div class=\"slide-item level-1\"><span class=\"math\">P=1</span></div>\n<div class=\"slide-item level-1\"><span class=\"math\">N=Z - P = 2</span></div>\n<div class=\"slide-item\">one pole</div>\n<div class=\"slide-item level-1\"><span class=\"math\">Z=0</span></div>\n<div class=\"slide-item level-1\"><span class=\"math\">P=1</span></div>\n<div class=\"slide-item level-1\"><span class=\"math\">N=Z- P = -1</span></div>\n<div class=\"slide-img\"><img src=\"images/img_146.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_147.png\" alt=\"\"></div>",
    "items_count": 10,
    "notes": "我们看另外两个例子。第一个例子，s平面上的围线包围F s的零点三个，极点一个，差值为二，所以在F s平面上的映射围线顺时针包围原心两周；第二个例子，s平面上的围线不包围F s的零点，但包围一个极点，所以零极点差值为负一，所以在F s平面上的映射围线逆时针包围原心一周。"
  },
  {
    "title": "Nyquist Criterion",
    "title_html": "Nyquist Criterion",
    "items_html": "<div class=\"slide-item\">Consider the characteristic equation</div>\n<div class=\"slide-item level-1\">Open loop</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{N(s)}{D(s)}</span></div>\n<div class=\"slide-item level-1\">Closed loop</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">F(s)=1+L(s)=\\frac{D(s)+N(s)}{D(s)}=\\frac{K\\prod_{i=1}^{M}(s+z_i)}{\\prod_{K=1}^{M}(s+p_k)}=0</span></div>\n<div class=\"slide-item\">The poles of <span class=\"math\">L(s)</span> are the same as the poles of <span class=\"math\">F(s)</span>.</div>\n<div class=\"slide-item\">For a system to be stable, all the zeros of <span class=\"math\">F(s)</span> must lie in the left-hand <span class=\"math\">s</span>-plane</div>",
    "items_count": 7,
    "notes": "判定控制系统稳定性的出发点是闭环系统的特征方程。如果一个系统的开环传递函数为L s，而且具有理分式的形式，分子、分母分别为N s和D s，那么闭环系统的特征方程F s可以表示为一加L s，显然，开环系统特征方程的极点与对应闭环系统的极点是一样的。系统要稳定，其前提是闭环系统特征方程的所有零点均位于s平面的左半平面。"
  },
  {
    "title": "Nyquist Criterion",
    "title_html": "Nyquist Criterion",
    "items_html": "<div class=\"slide-item\">Choose a contour <span class=\"math\">\\Gamma_s</span> in the <span class=\"math\">s</span>-plane that encloses the entire right-hand s-plane.</div>\n<div class=\"slide-item\">Plot <span class=\"math\">\\Gamma_F</span> in the <span class=\"math\">F(s)</span>-plane and determine the number of encirclements of the origin <span class=\"math\">N</span>.</div>\n<div class=\"slide-item\">The number of zeros of <span class=\"math\">F(s)</span> within the <span class=\"math\">\\Gamma_s</span> contour (i.e., the unstable zeros of <span class=\"math\">F(s)</span>) is <span class=\"math\">Z=N+P</span>.</div>\n<div class=\"slide-item level-1\">If <span class=\"math\">P=0</span>, the number of unstable roots of the system is equal to <span class=\"math\">N</span>, the number of encirclements of the origin in the <span class=\"math\">F(s)</span>-plane.</div>",
    "items_count": 4,
    "notes": "为此，我们首先在s平面上构造一个围线，令其包围整个右半平面，然后在F s平面上绘制F s复变函数对应构造围线的映射围线，并确定映射围线包括原心的圈数N。根据前面介绍的柯西定理，在s平面上构造围线包围F s零点的数目等于映射围线包围原心的数目与构造围线包围F s极点的数目之和。而闭环系统特征方程的极点与开环系统特征方程对应极点是一样的，且F s的映射围线与L s相比也只是多一个常数一而已。因此，只要研究开环系统特征方程极点分布及其映射围线，即可据此对系统稳定性作出判定。如果开环没有右平面上的极点，那么闭环系统右极点的数目，或者闭环系统具有不稳定根的数目就等于F s映射围线包围原心的数目。"
  },
  {
    "title": "Contours",
    "title_html": "Contours",
    "items_html": "<div class=\"slide-item\">The Nyquist criterion is concerned with the mapping of the characteristic equation <span class=\"math\">F(s) = 1+ L(s)</span> and the number of encirclements of the origin of the <span class=\"math\">F(s)</span>-plane.</div>\n<div class=\"slide-item\">The contour  <span class=\"math\">\\Gamma_F</span> in the <span class=\"math\">F(s)</span>-plane is known as the Nyquist diagram or polar pole.</div>\n<div class=\"slide-item\">It is convenience to consider the mapping of <span class=\"math\">L(s) = F(s)-1</span> and the contour <span class=\"math\">\\Gamma_L</span> in which the number of encirclements of the <span class=\"math\">(-1,\\ j0)</span> point of the <span class=\"math\">L(s)</span>-plane is of interest</div>\n<div class=\"slide-img\"><img src=\"images/img_148.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "乃氏判据关心闭环系统特征方程F s映射围线及其围绕F s平面原心的数目，这个映射围线实质上就是乃氏图或极坐标图。实际操作中，我们研究F s减一的映射围线更加方便，因为该围线就是开环系统的乃氏图，将围绕原心圈数转化为围绕负一、洁零点的圈数来判定稳定性。"
  },
  {
    "title": "Nyquist Stability Criterion",
    "title_html": "Nyquist Stability Criterion",
    "items_html": "<div class=\"slide-item\">A feedback control system is stable <em>if and only if</em> the contour <span class=\"math\">\\Gamma_L</span> in the <span class=\"math\">L(s)</span>-plane does not encircle the <span class=\"math\">(-1, j0)</span> point when the number of poles of <span class=\"math\">L(S)</span> in the right-half <span class=\"math\">s</span>-plane is zero.</div>\n<div class=\"slide-item\">A feedback control system is stable <em>if and only if</em>, for the contour <span class=\"math\">\\Gamma_L</span>, the number of counterclockwise encirclements of the <span class=\"math\">(-1, j0)</span> point is equal to the number of poles of <span class=\"math\">L(s)</span> with positive real parts.</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">Z=N+P \\rightarrow {\\ \\rm hope\\ } Z=0 \\rightarrow {\\ \\rm require\\ } N = -P</span></div>",
    "items_count": 3,
    "notes": "反馈控制系统仅且仅有在开环传递函数没有右极点时乃氏图不包围负一、洁零点的情况下才能稳定；或者，开环传递函数有右极点，且其乃氏图逆时针包围负一、洁零点的圈数就等于开环右极点的个数时，系统才能稳定。这就是乃氏稳定判据的完整表述。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 1",
    "title_html": "Nyquist Stability Criterion: Example 1",
    "items_html": "<div class=\"slide-item\">A single-loop control system with</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned}\nL(s)=\\frac{K}{(\\tau_1s+1)(\\tau_2s+1)} \\\\\nK=100,\\ \\tau_1=1,\\ {\\rm and}\\ \\tau_2=1/10\n\\end{aligned}</span></div>\n<div class=\"slide-item\">The Nyquist contour</div>\n<div class=\"slide-item level-1\"><span class=\"math\">+j\\omega</span>-axis: solid line</div>\n<div class=\"slide-item level-1\"><span class=\"math\">-j\\omega</span>-axis: dashed line</div>\n<div class=\"slide-item level-1\">Semicirlce with <span class=\"math\">r\\rightarrow\\infty</span>: origin of the <span class=\"math\">L(s)</span>- plane</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">P=0\\ {\\rm and}\\ N=0 \\rightarrow Z=0</span></div>\n<div class=\"slide-item\">The system is stable for all positive <span class=\"math\">K</span></div>\n<div class=\"slide-img\"><img src=\"images/img_149.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_150.png\" alt=\"\"></div>",
    "items_count": 10,
    "notes": "下面我们通过一些具体实例说明如何利用乃氏稳定判据判定系统稳定性。例一，如果一个单回路开环传递函数的形式为L s，其中参数K等于一百，套一、套二分别为一和十分之一。第一步，首先绘制系统的开环乃氏图，s平面的右半平面可以用虚轴和无限大的半圆来表示，虚轴正向用实线表示，虚轴负向用虚线表示，半径无限大的半圆也用实线表示。根据我们前面所学知识，乃氏图绘制时主要考虑正频率部分，负频率对应的乃氏图与正频率对应的乃氏图关于实轴对称。频率为零时，对应乃氏图上的一百、洁零点，频率为无穷时，相当于s平面上的半圆，映射到乃氏图上为L平面上的原点，中间再找几个特殊频率点，可以绘制出乃氏图的轮廓，我们发现，开环传递函数没有右极点，同时乃氏图也不包围负一、洁零点，因此该系统对于正值K都是稳定的。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 2",
    "title_html": "Nyquist Stability Criterion: Example 2",
    "items_html": "<div class=\"slide-item\">The system under consider is given by <span class=\"math\">L(s)=\\frac{K}{s(\\tau s+1)}</span></div>\n<div class=\"slide-item level-2\">Type one system (one open-loop pole at the origin)</div>\n<div class=\"slide-item\">The contour <span class=\"math\">\\Gamma_s</span> must be slightly adjusted to exclude pole within the contour.</div>\n<div class=\"slide-item level-2\">The origin of the <span class=\"math\">s</span>-plane: <span class=\"math\">s=\\varepsilon e^{j\\phi}</span> for <span class=\"math\">\\phi</span> from <span class=\"math\">-90^\\circ</span> to 0 to <span class=\"math\">+90^\\circ</span>.</div>\n<div class=\"slide-item level-2\">From <span class=\"math\">\\omega=0^+</span> to <span class=\"math\">\\omega=+\\infty</span></div>\n<div class=\"slide-item level-2\">From <span class=\"math\">\\omega=+\\infty</span> to <span class=\"math\">\\omega=-\\infty</span></div>\n<div class=\"slide-item level-2\">From <span class=\"math\">\\omega=-\\infty</span> to <span class=\"math\">\\omega=0^-</span></div>\n<div class=\"slide-item\">It is sufficient to construct the contour <span class=\"math\">\\Gamma_L</span> for the frequency range <span class=\"math\">0^+&lt;\\omega&lt;+\\infty</span> order to investigate the stability.</div>\n<div class=\"slide-item\">The system is stable.</div>\n<div class=\"slide-img\"><img src=\"images/img_151.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_152.png\" alt=\"\"></div>",
    "items_count": 11,
    "notes": "第二个例子，有一个零极点，属于一型系统。这时候s平面上的围线不能是完整的右半平面，因为零极点在虚轴上，无法严格区分是包围还是不包围开环的极点。为此，有两种解决途径，一是取s平面上不包围零极点的围线，图上所示的就是这种处理方法，取一段小圆弧绕过圆心；另一种处理方法是，令s平面上的围线包围圆心，与当前处理方法相似，只是小圆弧的开口朝右，与当前状态对称。通常我们取第一种处理方法，零极点用一个新的复数来替换，其模为小量epsilon，相角phi由负九十度变到正九十度，这恰好就是开口朝左的小半圆。接下来绘制乃氏图，频率由零正到正无穷变化时，根据开环传递函数表达式，模将由无穷大变到零，相角由负九十度变到负一百八十度，所以乃氏图在第三象限负无穷远处直至由负实轴方向达到原点，然后再对称出负频率部分。接下来判定频率由零正到零负变化时相角的变化，我们在原心处取的是右半小圆弧，相角由负九十度到零再到正九十度，由于在分母上，所以乃氏图由零正频率变到零负频率时，相角将由正九十度变到零再变到负九十度，刚好是通过右半环连起来。由此可以看出，乃氏图在K大于零时不包围负一、洁零点，因此系统稳定。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 3",
    "title_html": "Nyquist Stability Criterion: Example 3",
    "items_html": "<div class=\"slide-item\">The system is given by</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{K}{s(\\tau_1s+1)(\\tau_2s+1)}</span></div>\n<div class=\"slide-item\">The phase angle of intersection with minor real axis</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned}\n-\\frac{\\pi}{2} &amp;- \\tan^{-1} \\tau_1\\omega - \\tan^{-1} \\tau_2\\omega = -\\pi \\\\\n\\omega &amp;= \\frac{1}{\\sqrt{\\tau_1\\tau_2}}\\\\\n|L(j(\\omega))| &amp;= \\frac{K\\sqrt{\\tau_1\\tau_2}}{\\sqrt{1+ \\frac{\\tau_1}{\\tau_2}}\\cdot\\sqrt{1+ \\frac{\\tau_2}{\\tau_1}}}\\\\\n&amp;= \\frac{K\\tau_1\\tau_2}{\\tau_1+\\tau_2}\n\\end{aligned}</span></div>\n<div class=\"slide-img\"><img src=\"images/img_153.png\" alt=\"\"></div>",
    "items_count": 5,
    "notes": "这个例子相比于例二，系统有三个极点，其中一个为零极点。频率为零正和趋于正无穷时的分析与前一个基本相似，乃氏图由第三象限负无穷远处、沿负二分之派方向过来，模将一直趋于零，但相角将趋于负二分之三派，所以相角会经过负派，因此乃氏图必将与负实轴相交，相交点对应的相角为负派。列出相角方程，解出对应的频率应该为根号套一套二分之一，再将此频率代入幅频函数表达式，很容易计算对应的幅值为K倍的套一套二相乘除以套一套二相加的和，这样与负实轴的交点就求出来了。画出正频率区间对应的乃氏图，再通过对称画出负频率区间对应的乃氏图，采用与例二相同的分析思路，将零正、零负连起来，形成封闭围线。可以看出，此时系统的稳定性与参数取值有关，当与负实轴的交点位于负一的右侧时，映射围线不包围负一、洁零点，系统稳定，反之系统不稳定。"
  },
  {
    "title": "Example 3",
    "title_html": "Example 3",
    "items_html": "<div class=\"slide-item\">When <span class=\"math\">\\tau_1=\\tau_2=1</span> and <span class=\"math\">K</span> is varied</div>\n<div class=\"slide-img\"><img src=\"images/img_154.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "这是套一、套二等于一的情况下，K值改变时，乃氏图与负实轴交点的变化情况，可以看出，a图不包围负一、洁零点，系统稳定，c图包围负一、洁零点，系统不稳定，b图穿过负一、洁零点，系统临界稳定。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 4",
    "title_html": "Nyquist Stability Criterion: Example 4",
    "items_html": "<div class=\"slide-item\">The system is given by <span class=\"math\">L(s)=\\frac{K}{s^2(\\tau s+1)}</span></div>\n<div class=\"slide-item\">Note that</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned} L(j\\omega) &amp; = \\frac{K}{-\\omega^2(j\\omega\\tau+1)} \\\\\n&amp; = \\frac{K}{\\sqrt{\\omega^4+\\tau^2\\omega^6}}\\angle(-\\pi-\\tan^{-1}(\\omega\\tau)) \\end{aligned}</span></div>\n<div class=\"slide-item\">The angle of <span class=\"math\">L(j\\omega)</span> is always <span class=\"math\">-180^\\circ</span> or less and the locus 轨迹 of <span class=\"math\">L(j\\omega)</span> is above the <span class=\"math\">u</span>-axis for all values of <span class=\"math\">\\omega</span></div>\n<div class=\"slide-item\">Because the contour encircles the <span class=\"math\">(-1, j0)</span> point twice, there are two roots of the closed-loop system in the right-hand plane, and the system, irrespective of the gain <span class=\"math\">K</span>, is unstable.</div>\n<div class=\"slide-img\"><img src=\"images/img_155.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "例四，跟例二相似，但有两个积分环节，也就是有两个零极点。将频率特性函数写成模与相角的形式，我们注意到，频率为零正时，模趋于无穷大，相角趋于负派，频率趋于正无穷时，模趋于零，相角趋于负二分三派，据此可粗略地估算出乃氏曲线位于第二象限，呈半纺锤形状。对称画出负频率部分，位于第三象限。将零负与零连起来，期间相角由负二分派、到零、再到正二分之派，由于具有两个积分环节，所以频率特性相角将由正派到零再到负派，顺时针构成一个大圆。所以，完整的乃氏图顺时针包围负一、洁零点两圈，所以不管K值取多少，系统均不稳定。需要注意的是，分析中我们假定K值为正，如果K取负值，乃氏图将位于第一、第四象限，不包围负一、洁零点，系统变得稳定。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 5A",
    "title_html": "Nyquist Stability Criterion: Example 5A",
    "items_html": "<div class=\"slide-item\">Consider the system that is unstable in the open loop</div>\n<div class=\"slide-item level-1\">Consider <span class=\"math\">K_2=0</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{K_1}{s(s-1)}</span></div>\n<div class=\"slide-item level-1\">As <span class=\"math\">P=1</span>, it is required that <span class=\"math\">N=-1</span> for the stable closed system.</div>\n<div class=\"slide-item\">The contour <span class=\"math\">\\Gamma_L</span> in the <span class=\"math\">L(s)</span>-plane encircles the <span class=\"math\">(-1, j0)</span> point once in the clockwise direction so <span class=\"math\">N=1</span>, and there is one pole in the right-half plane so <span class=\"math\">P=1</span>. Hence <span class=\"math\">Z=N+P=2</span> and the system is unstable.</div>\n<div class=\"slide-img\"><img src=\"images/img_156.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_157.png\" alt=\"\"></div>",
    "items_count": 7,
    "notes": "右图所示，如果内反馈K二等于零，由于开环传递函数有右极点，所以开环不稳定。要想使闭环系统稳定，就要求开环乃氏图逆时针包围负一、洁零点一圈。而事实是，该开环传递函数顺时针包围了负一、洁零点一圈，因此N等于一，所以闭环系统在右半平面的极点数目为二，因此系统不稳定。关于乃氏图的绘制，此处就不再赘述了。"
  },
  {
    "title": "Nyquist Stability Criterion: Example 5B",
    "title_html": "Nyquist Stability Criterion: Example 5B",
    "items_html": "<div class=\"slide-item\">For the unstable system with positive <span class=\"math\">K_2</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{K_1(1+K_2s)}{s(s-1)}</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(j\\omega)=\\frac{-K_1(\\omega^2+\\omega^2K_2)+jK_1(\\omega-K_2\\omega^3)}{\\omega^2+\\omega^4}</span></div>\n<div class=\"slide-item\">The <span class=\"math\">L(j\\omega)</span> locus intersects the <span class=\"math\">u</span>-axis at a point where the imaginary part of <span class=\"math\">L(j\\omega)</span> is zero, i.e., <span class=\"math\">\\omega^2=1/K_2</span></div>\n<div class=\"slide-item\">The value of the real part of <span class=\"math\">L(j\\omega)</span> at the intersection is then</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">u|_{\\omega^2=1/K_2}=\\frac{-K_1(\\omega^2+\\omega^2K_2)}{\\omega^2+\\omega^4}=-K_1K_2</span></div>\n<div class=\"slide-item\">When <span class=\"math\">K_1K_2&gt;1</span>, the contour <span class=\"math\">\\Gamma_L</span> encircles the <span class=\"math\">(-1, j0)</span> point once in a counterclockwise direction and therefore <span class=\"math\">N=-1</span>. The system becomes stable.</div>\n<div class=\"slide-img\"><img src=\"images/img_158.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "当K二不为零时，将K二的引出点后移，反馈环节变成K二乘s，与原有的单位反馈合并成一加K二s，所以开环传递函数就变成这个表达式，前向通路K一、s减一分之一、s分之一三者相乘，再与合并反馈K二s加一相乘。将开环传递函数写成频率特性函数，并转化成实部、虚部相加的形式，虚部为零时乃氏图与实轴相交，显然对应的频率为根号K二分之一，再计算一下该频率下的实部，即可得到乃氏图与实轴的交点位置，为负K一、K二的乘积，当K一、K二乘积大于一时，乃氏图将逆时针包围负一、洁零点一圈，N等于负一，满足前面提到的闭环稳定条件的要求，系统稳定。"
  },
  {
    "title": "Relative Stability and the Nyquist Criterion",
    "title_html": "Relative Stability and the Nyquist Criterion",
    "items_html": "<div class=\"slide-item\">Relative stability of a system in the time domain</div>\n<div class=\"slide-item level-1\">Real part of the roots 闭环特征根的实部</div>\n<div class=\"slide-item level-1\">Related to the settling time</div>\n<div class=\"slide-item level-1\">Defined as how far the roots are to the <span class=\"math\">j\\omega</span>-axis</div>\n<div class=\"slide-item\">Relative stability in the frequency domain</div>\n<div class=\"slide-item level-1\">Defined as how far the Nyquist contour is away from the -1 point.</div>\n<div class=\"slide-item level-1\">More applicable 应用更广</div>\n<div class=\"slide-item\">The Nyquist stability criterion is defined in terms of the <span class=\"math\">(-1, j0)</span> point on the polar plot or the 0-dB, <span class=\"math\">-180^\\circ</span> point on the Bode diagram or log-magnitude-phase diagram.</div>\n<div class=\"slide-item\">The proximity 相近程度 of the <span class=\"math\">L(j\\omega)</span> locus to this stability point is a measure of the relative stability of a system.</div>",
    "items_count": 9,
    "notes": "接下来我们讨论一下相对稳定性的概念。时域内的相对稳定性与特征方程根的实部位置有关，离虚轴越远，稳定性越好。还跟调整时间有关，调整时间越短，相对稳定性越好。频域里的相对稳定性定义为乃氏曲线与负一点的远近程度，其应用更为广泛。极坐标图上，乃氏稳定判据根据负一、j 零点确定，波德图或对数幅相图上，根据零分贝、负一百八十度对应的点进行确定。开环频率特性曲线离这些稳定点的相近程度可以作为系统相对稳定性的度量指标。"
  },
  {
    "title": "Relative Stability",
    "title_html": "Relative Stability",
    "items_html": "<div class=\"slide-item\">Consider <span class=\"math\">\\displaystyle L(s)=\\frac{K}{s(\\tau_1s+1)(\\tau_2s+1)}</span> for some different <span class=\"math\">K</span>.</div>\n<div class=\"slide-item\">As <span class=\"math\">K</span> increases, the polar plot approaches the <span class=\"math\">(-1, j0)</span> point and eventually encircles the <span class=\"math\">(-1, j0)</span> point.</div>\n<div class=\"slide-item\">The locus intersects the u-axis at a point</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">u=\\frac{-K\\tau_1\\tau_2}{\\tau_1+\\tau_2}</span></div>\n<div class=\"slide-item\">The system has roots on the <span class=\"math\">j\\omega</span> -axis when <span class=\"math\">u= -1</span> or</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">K=\\frac{\\tau_1+\\tau_2}{\\tau_1\\tau_2}</span></div>\n<div class=\"slide-item\">The margin between the critical gain <span class=\"math\">K=\\frac{\\tau_1+\\tau_2}{\\tau_1\\tau_2}</span> and a gain <span class=\"math\">K = K_2</span> is a measure of the relative stability.</div>",
    "items_count": 7,
    "notes": "考虑开环传递函数在K值不同时的相对稳定性问题。前面我们已讨论过该函数的稳定性判据问题，已经得出结论，随着K值的增加，极坐标图不断趋近于负一、洁零点，最终会包围该点。与实轴的交点坐标我们也已经知道，可以表示成u，u等于负一时，对应闭环系统临界稳定，在虚轴上有极点存在，此时的K值可以表示成tau 1、tau 2的和与其积的比值。不同K值与临界K值之间的差值是系统相对稳定性的一种度量指标。"
  },
  {
    "title": "Gain Margins 幅值裕量",
    "title_html": "Gain Margins 幅值裕量",
    "items_html": "<div class=\"slide-item\"><i>The gain margin</i> is defined as the reciprocal of the gain <span class=\"math\">|L(j\\omega)|</span> at the frequency at which the phase angle reaches <span class=\"math\">-180^\\circ</span>.</div>\n<div class=\"slide-item\"><i>The gain margin</i> is the increase in the system gain when phase is <span class=\"math\">-180^\\circ</span> that will result in a marginally stable system with intersection of the <span class=\"math\">(-1, j0)</span> point on the Nyquist diagram.</div>\n<div class=\"slide-img\"><img src=\"images/img_159.png\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "幅值裕度定义为，相角达到一百八十度时，对应频率下幅值的倒数，其值越大，稳定裕度越好。幅值裕度可以理解为，系统在达到临界稳定之前，能够容许的系统增益的放大倍数。"
  },
  {
    "title": "Gain Margin",
    "title_html": "Gain Margin",
    "items_html": "<div class=\"slide-item\">The gain margin is a measure of the factor by which the system gain would have to be increased for the <span class=\"math\">L(j\\omega)</span> locus to pass through the <span class=\"math\">u=-1</span> point.</div>\n<div class=\"slide-item\">For <span class=\"math\">K=K_2</span>, the gain margin is equal to the reciprocal of <span class=\"math\">L(j\\omega)</span> when <span class=\"math\">v = 0</span>.</div>\n<div class=\"slide-item\">When the phase shift is <span class=\"math\">-180^\\circ</span>, the corresponding frequency is <span class=\"math\">\\omega=\\frac{1}{\\sqrt{\\tau_1\\tau_2}}</span></div>\n<div class=\"slide-item\">The gain margin is thus</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\frac{1}{|L(j\\omega)|}=\\left[\\frac{K_2\\tau_1\\tau_2}{\\tau_1+\\tau_2}\\right]^{-1}=\\frac{1}{d}</span></div>\n<div class=\"slide-item\">In terms of dB, the gain margin is <span class=\"math\">-20\\log d</span> dB.</div>\n<div class=\"slide-item\"><span class=\"math\">\\tau_1=\\tau_2=1</span>，the critical gain <span class=\"math\">K = \\frac{\\tau_1 +\\tau_2}{\\tau_1\\tau_2}</span> is 2. If <span class=\"math\">K_2 = 0.5</span>，gain margin is 4.</div>\n<div class=\"slide-img\"><img src=\"images/img_160.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "用右图来解释幅值裕量，为了使极坐标曲线恰好经过负一点，系统增益允许增加的最大放大倍数。就拿K二对应的红色极坐标曲线为例进行说明，红色极坐标曲线与实轴相交时虚部为零，相角为负一百八十度，对应频率为根号套一套二分之一。根据幅值裕量的定义，与实轴交点坐标与原点的距离为d，代表该频率下的幅值大小，其倒数即为幅值裕量。以分贝形式进行表达就是负二十倍的log d。比如，套一、套二均为一时，临界K值为二，如果系统增益为零点五，说明系统有一定的稳定裕度，可以计算出来稳定裕度为四，表明系统在变得不稳定之前，在原来增益的基础上还以提高到原增益的四倍。"
  },
  {
    "title": "Phase Margin 相角裕量",
    "title_html": "Phase Margin 相角裕量",
    "items_html": "<div class=\"slide-item\"><i>The phase margin</i> is defined as the phase angle through which the <span class=\"math\">L(j\\omega)</span> locus must be rotated so that the unity magnitude point will pass through the <span class=\"math\">(-1, j0)</span> point in the <span class=\"math\">L(j\\omega)</span> plane.</div>\n<div class=\"slide-item\">The phase margin is the additional phase lag required before the system becomes unstable.</div>\n<div class=\"slide-item\">For <span class=\"math\">K= K_2</span>, an additional phase angle <span class=\"math\">\\phi_2</span> may be added to the system before the system becomes unstable; the phase margin is thus <span class=\"math\">\\phi_2</span>.</div>\n<div class=\"slide-item\">For the gain <span class=\"math\">K_1</span>, the phase margin is equal to <span class=\"math\">\\phi_1</span>.</div>\n<div class=\"slide-img\"><img src=\"images/img_161.png\" alt=\"\"></div>",
    "items_count": 5,
    "notes": "相角裕度定义为，为了使极坐标曲线的单位幅值点通过L平面上的负一、洁零点，极坐标曲线绕原点需要转过的角度。实际上，相角裕量给出了避免系统失稳最大冗余相角。比如，还以红色极坐标曲线为例，系统失稳前，可以引入的额外相角为phi 二，所以相角裕量为phi 二，而绿色的极坐标曲线对应的相角裕量就phi 一。"
  },
  {
    "title": "Phase Margins",
    "title_html": "Phase Margins",
    "items_html": "<div class=\"slide-item\"><i>The phase margin</i> is the amount of phase shift of the <span class=\"math\">L(j\\omega)</span> at unity magnitude that will result in a marginally stable system with the intersection of the <span class=\"math\">(-1, j0)</span> point on the Nyquist diagram.</div>\n<div class=\"slide-img\"><img src=\"images/img_162.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "总的来讲，相角裕量是指，系统达到临界稳定之前，开环传递函数的单位幅值点允许的相移量。也就是，在原有单位幅值点对应相角上再增加一定的相移量，乃氏图将与负一、j 零点相交，达到临界稳定。"
  },
  {
    "title": "Gain and Phase Margins on Bode Diagram",
    "title_html": "Gain and Phase Margins on Bode Diagram",
    "items_html": "<div class=\"slide-item\">The critical point for stability is <span class=\"math\">u=-1</span> and <span class=\"math\">v=0</span> in the <span class=\"math\">L(j\\omega)</span> plane, which is equivalent to a logarithmic magnitude of 0 dB and a phase angle of <span class=\"math\">-180^\\circ</span> on the Bode diagram.</div>\n<div class=\"slide-item\">Consider</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(j\\omega)=\\frac{1}{j\\omega(j\\omega+1)(0.2j\\omega+1)}</span></div>\n<div class=\"slide-item\">The phase angle when the gain is 0 dB is <span class=\"math\">137^\\circ</span>.</div>\n<div class=\"slide-item\">The gain when the phase is <span class=\"math\">-180^\\circ</span> is -15 dB.</div>\n<div class=\"slide-item\">Phase margin: <span class=\"math\">43^\\circ</span>.</div>\n<div class=\"slide-item\">Gain margin: 15 dB</div>\n<div class=\"slide-img\"><img src=\"images/img_163.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "与极坐标曲线相比较，我们更倾向于使用伯德图来表征系统的稳定裕量。在极坐标平面上的临界稳定点是负一、洁零点，等效到伯德图上是零分贝线和负一百八十度线。所以，根据幅频特性曲线与零分贝线的交点对应在相频特性曲线上的相角与负一百八度角之间的差值即可估算出系统的相角裕量；同样的，根据相频特性曲线与负一百八十度线交点对应在幅频特性曲线上的对应点估算出系统的幅值裕量。比如，考虑这一形式的幅频特性函数，绘制出其伯德图，具体绘制方法这里我们就不介绍了。我们发现，零分贝时对应相角负一百三十七度，与负一百八相差四十三度，所以相角裕量为四十三度。负一百八十度相角对应的幅值为负十五分贝，所以幅值裕量为十五分贝。可以看出，幅值裕量和相角裕量都很容易从伯德图上近似得到，非常方便。"
  },
  {
    "title": "Margins on Log-Magnitude-Phase Diagram",
    "title_html": "Margins on Log-Magnitude-Phase Diagram",
    "items_html": "<div class=\"slide-item\">For the log-magnitude-phase diagram, the critical stability point is the 0-dB, <span class=\"math\">-180^\\circ</span> point, and the gain margin and phase margin can be easily determined and indicated on the diagram.</div>\n<div class=\"slide-item\">Consider <span class=\"math\">\\displaystyle L_1(j\\omega)=\\frac{1}{j\\omega(j\\omega+1)(0.2j\\omega+1)}</span></div>\n<div class=\"slide-item level-1\">Phase margin: <span class=\"math\">43^\\circ</span></div>\n<div class=\"slide-item level-1\">Gain margin: 15 dB</div>\n<div class=\"slide-item\">Consider <span class=\"math\">\\displaystyle L_2(j\\omega)=\\frac{1}{j\\omega(j\\omega+1)^2}</span></div>\n<div class=\"slide-item level-1\">Phase margin: <span class=\"math\">20^\\circ</span></div>\n<div class=\"slide-item level-1\">Gain margin: 5.7 dB</div>\n<div class=\"slide-img\"><img src=\"images/img_164.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "对于对数幅相图来说，临界稳定点变为零分贝、负一百八十度点，幅值裕量和相角裕量更容易从图上得出。比如，我们比较一下两个频率特性函数对应的对数幅相图。过零分贝线、负一百八十度点分别作水平和垂直线，找到与对数幅相曲线相交的点，测量出与起始点的绝对距离，水平距离即为相角裕量，垂直距离即为幅值裕量。"
  },
  {
    "title": "Phase Margin of a Second-Order System",
    "title_html": "Phase Margin of a Second-Order System",
    "items_html": "<div class=\"slide-item\">Consider the loop transfer function</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{\\omega_n^2}{s(s+2\\zeta\\omega_n)}, \\quad L(j\\omega)=\\frac{\\omega_n^2}{j\\omega(j\\omega+2\\zeta\\omega_n)}</span></div>\n<div class=\"slide-item\">The magnitude of the frequency response is equal to 1 at a frequency <span class=\"math\">\\omega_c</span> (the gain cross-over frequency 剪切频率); thus</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\frac{\\omega_n^2}{\\omega_n\\sqrt{\\omega_c^2+4\\zeta^2\\omega_n^2}}=1 \\rightarrow\\frac{\\omega_c^2}{\\omega_n^2}=\\sqrt{4\\zeta^4+1}-2\\zeta^2</span></div>\n<div class=\"slide-item\">The phase margin is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned} \\phi_{\\rm pm}&amp; = 180^\\circ -90^\\circ -\\tan^{-1}\\frac{\\omega_c}{2\\zeta\\omega_n}\\\\\n&amp; = 90-\\tan^{-1}(\\frac{1}{2\\zeta}\\sqrt{\\sqrt{4\\zeta^4+1}-2\\zeta^2})=\\tan^{-1}(\\frac{2}{\\sqrt{\\sqrt{4+(1/\\zeta^4)}-2}}) \\end{aligned}</span></div>",
    "items_count": 6,
    "notes": "下面我们专门讨论一下二阶系统。考虑以下的开环传递函数及对应的频率特性函数。令其幅值为一，找到对应的频率omega c，我们称之为剪切频率。相角裕量可以表示成phi pm，这样，我们就可以得到了二阶欠阻尼系统相角裕量与阻尼系数之间的关系。"
  },
  {
    "title": "Phase Margin of a Second-Order System",
    "title_html": "Phase Margin of a Second-Order System",
    "items_html": "<div class=\"slide-item\">For an under-damped second order system, the phase margin is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\phi_{\\rm pm}=\\tan^{-1}(\\frac{2}{\\sqrt{\\sqrt{4+(1/\\zeta^4)}-2}})</span></div>\n<div class=\"slide-item\">The relationship between the phase margin and damping ratio can be approximated as <span class=\"math\">\\zeta=0.01\\phi_{\\rm pm}</span> 相解裕量近似阻尼比的100倍</div>\n<div class=\"slide-img\"><img src=\"images/img_165.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "将相角裕量与阻尼比的关系式绘制成曲线，我们发现，这一曲线可以用一条直线来近似表达，相角裕量近似是阻尼比的一百倍，如果阻尼为零点五，相角裕量近似为五十度。所以阻尼比越大，稳定程度越高。更多的时候，我们是根据相角裕量来估算阻尼比的，进而再计算系统的时域指标，比如超调量或调整时间等。"
  },
  {
    "title": "Time-Domain Performance Criteria the Freq. Domain",
    "title_html": "Time-Domain Performance Criteria the Freq. Domain",
    "items_html": "<div class=\"slide-item\">The closed-loop frequency response is the frequency response of the closed-loop transfer function <span class=\"math\">T(j\\omega)</span>.</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">T(j\\omega)=\\frac{G_c(j\\omega)G(j\\omega)}{1+G_c(j\\omega)G(j\\omega)H(j\\omega)}</span></div>\n<div class=\"slide-item\"><i>The Nyquist criterion and phase margin index</i> are defined for the loop transfer function</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(j\\omega)=G_c(j\\omega)G(j\\omega)H(j\\omega)</span></div>\n<div class=\"slide-item\">The maximum magnitude of the closed-loop frequency response can be related to the damping ratio of a second-order system of</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">M_{p\\omega}=|T(j\\omega_r)|=(2\\zeta\\sqrt{1-\\zeta^2})^{-1},\\ \\zeta&lt;0.707</span></div>\n<div class=\"slide-item\">Objective: to obtain the closed-loop frequency response from the open-loop frequency response.</div>",
    "items_count": 7,
    "notes": "系统的响应是根据闭环传递函数来确定的，但是乃氏判据及相角裕量指标却是依据开环传递函数确定的。之前我们也讨论了二阶系统闭环频率响应的最大幅值与阻尼比之间的关系，阻尼比可以通过开环传递函数的相角裕量进行估算，因此，我们希望在考察开环乃氏图时就能确定谐振峰值，也就是由开环频率响应得到闭环频率响应，从而简化分析过程。"
  },
  {
    "title": "Constant Magnitude M Circles 等幅值M圆",
    "title_html": "Constant Magnitude M Circles 等幅值M圆",
    "items_html": "<div class=\"slide-item\">In the unity feedback case, key performance indicators such as <span class=\"math\">M_{p\\omega}</span> and <span class=\"math\">\\omega_r</span> can be determined from the magnitude-phase plot using M-circles which are circles of constant magnitude of the closed-loop transfer function.</div>\n<div class=\"slide-item\">The relation</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">T(j\\omega)=M(\\omega)e^{j\\phi(\\omega)}=\\frac{G_c(j\\omega)G(j\\omega)}{1+G_c(j\\omega)G(j\\omega)}</span></div>\n<div class=\"slide-item\">When <span class=\"math\">G_c(j\\omega)G(j\\omega)=u+jv</span>, the magnitude becomes</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">M(\\omega)=\\left|\\frac{G_c(j\\omega)G(j\\omega)}{1+G_c(j\\omega)G(j\\omega)}\\right|=\\left|\\frac{u+jv}{1+u+jv}\\right|=\\frac{\\sqrt{u^2+v^2}}{\\sqrt{(1+u)^2+v^2}}</span></div>",
    "items_count": 5,
    "notes": "对于单位反馈系统，谐振峰值和谐振频率等关键指标可以利用闭环传递函数的等幅值圆在幅相图中进行确定。接下来我们分析一下具体步骤。比如，闭环传递函数的形式是T j omega，显然其幅值和相角均是频率的函数，如果开环传递函数写成实部与虚部相加的形式，闭环幅值可以推导出关于开环实部与虚部的函数。"
  },
  {
    "title": "Constant Magnitude M Circles",
    "title_html": "Constant Magnitude M Circles",
    "items_html": "<div class=\"slide-item\">For a given M the variables <span class=\"math\">u</span> and <span class=\"math\">v</span> satisfy</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\left(u-\\frac{M^2}{1-M}\\right)^2+v^2=\\left(\\frac{M^2}{1-M^2}\\right)^2</span></div>\n<div class=\"slide-item\">In the <span class=\"math\">(u,v)</span>-plane, this is a circle</div>\n<div class=\"slide-item level-1\">center: <span class=\"math\">\\displaystyle (u,v)=(\\frac{M^2}{1-M^2},0)</span></div>\n<div class=\"slide-item level-1\">radius: <span class=\"math\">|\\frac{M^2}{1-M^2}|</span></div>\n<div class=\"slide-img\"><img src=\"images/img_166.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "我们再对幅值M进行变换，当M不等于一且固定不变时，开环实部、虚部满足以下方程，不难发现，该方程是u、v平面上的一个圆方程，其圆心为M平方除以一减M平方，半径是M平方除以一减M平方的绝对值。M取值不同时，可以画出一系列的圆，它们关于负二分之一垂线对称，M小于一时，位于垂线右侧，M大于一时位于垂线左侧，M等于一时就是垂线本身。"
  },
  {
    "title": "M Circles                                                      :noexport:",
    "title_html": "M Circles                                                      :noexport:",
    "items_html": "<div class=\"slide-item\">In the <span class=\"math\">L(j\\omega)</span> or (u,v) plane, constant M circles can be plotted.</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">(u-\\frac{M^2}{1-M})^2+v^2=(\\frac{M^2}{1-M^2})^2</span></div>",
    "items_count": 2,
    "notes": ""
  },
  {
    "title": "Implication of M Circles",
    "title_html": "Implication of M Circles",
    "items_html": "<div class=\"slide-item\">The maximum magnitude of the closed-loop frequency response <span class=\"math\">M_{p\\omega}</span> is the value of the /M/ circles that is tangent to the <span class=\"math\">L(j\\omega)</span> locus.</div>\n<div class=\"slide-img\"><img src=\"images/img_167.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "闭环频率响应的谐振峰值就是与开环乃氏图相切的M圆对应的幅值。比如，左侧图上显示，对应开一、开二乃氏图的两个相切M圆分别是M一和M二，所以闭环系统的谐振峰值分别为M一和M二。如果找到开环极坐标图不同频率点处相交的其他等挨木圆，就可以得到完整的闭环频率响应幅频特性。比如K二极坐标图，与M一圆有两个交点，分别对应omega一和omega二，再加上谐振频率，就可以确定K二对应闭环幅频特性曲线上的三个点，找到与更多M圆的交点，就可以更准确地反映闭环系统的频率特性曲线。"
  },
  {
    "title": "Constant Phase N Circles 等相角N圆",
    "title_html": "Constant Phase N Circles 等相角N圆",
    "items_html": "<div class=\"slide-item\">The phase relation is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\phi(\\omega)=\\angle T(j\\omega)=\\angle(u+jv)-\\angle(1+u+jv)=\\tan^{-1}(\\frac{v}{u})-\\tan^{-1}(\\frac{v}{1+u})</span></div>\n<div class=\"slide-item\">Let <span class=\"math\">N=\\tan\\phi</span>, we have <span class=\"math\">\\displaystyle u^2+v^2+u-\\frac{v}{N}=0</span> or [fn::<span class=\"math\">\\tan (A \\pm B) = \\frac{\\tan A \\pm \\tan B}{1 \\mp \\tan A\\tan B}</span>]</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">(u+\\frac{1}{2})^2+(v-\\frac{1}{2N})^2=\\frac{1}{4}(1+\\frac{1}{N^2})</span></div>\n<div class=\"slide-item\">This gives constant phase N circles</div>\n<div class=\"slide-item level-1\">center: <span class=\"math\">\\displaystyle (u,v)=(-\\frac{1}{2},\\frac{1}{2N})</span></div>\n<div class=\"slide-item level-1\">radius: <span class=\"math\">\\displaystyle \\frac{1}{2}\\sqrt{1+\\frac{1}{N^2}}</span></div>",
    "items_count": 7,
    "notes": "类似地，我们可以推导出闭环相角为常值时的等N圆。根据前面提到的闭环传递函数表达式，推导出相角关于开环传递函数实部、虚部的函数，两边同时取正切，并令闭环相角的正切为N，利用两角和差的正切公式可以得到，u平方 加 v平方 加 v 再减v除以u等于零，或者可以整理成下式。两边同时加一个常数，左边配成两个完全平方的和，这样也转变为一个圆方程，很容易确定出圆心坐标和圆的半径。N变化时，等相角N圆的圆心和半径会发生相应的变化。"
  },
  {
    "title": "Nichols Chart",
    "title_html": "Nichols Chart",
    "items_html": "<div class=\"slide-item\">/M/ and /N/ circles are constant magnitude and constant phase in the <span class=\"math\">L(j\\omega)</span> plane, applicable to polar plot.</div>\n<div class=\"slide-item\">In the log-magnitude-phase diagram, the constant magnitude and constant phase contours can also be drawn, leading to the Nichols chart.</div>\n<div class=\"slide-item level-1\">Open loop system: horizontal and vertical axes</div>\n<div class=\"slide-item level-1\">Closed-loop system: constant M lines and constant N lines</div>\n<div class=\"slide-img\"><img src=\"images/img_168.png\" alt=\"\"></div>",
    "items_count": 5,
    "notes": "M圆和N圆是开环传递函数平面上的等幅值和等相角圆，主要应用于极坐标图。在对数幅相图上，也可以绘制等幅值和等相角曲线，这样就得到了尼科尔斯图。右图中，蓝色粗线代表等相角曲线，单位为度，浅色灰线代表等幅值曲线，单位为分贝。对开环系统而言，对应图中水平与垂直的网络线，对闭环系统而言，对应图中的等挨木线和等嗯线。"
  },
  {
    "title": "Nichols Chart Application 1",
    "title_html": "Nichols Chart Application 1",
    "items_html": "<div class=\"slide-item\">Consider</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_c(j\\omega)G(j\\omega)=\\frac{1}{j\\omega(j\\omega+1)(0.2j\\omega+1)}</span></div>\n<div class=\"slide-item\">The maximum magnitude</div>\n<div class=\"slide-item level-1\">At frequency <span class=\"math\">\\omega_r=0.8</span></div>\n<div class=\"slide-item level-1\"><span class=\"math\">M_{p\\omega}:\\ 2.5 {\\rm dB}</span></div>\n<div class=\"slide-item level-1\">Phase: <span class=\"math\">-72^\\circ</span></div>\n<div class=\"slide-item\">The 3-dB closed-loop bandwidth</div>\n<div class=\"slide-item level-1\">Bandwidth <span class=\"math\">\\omega_B=1.33</span></div>\n<div class=\"slide-item level-1\">Phase: <span class=\"math\">-142^\\circ</span></div>\n<div class=\"slide-img\"><img src=\"images/img_169.png\" alt=\"\"></div>",
    "items_count": 10,
    "notes": "接下来我们讨论一下如何用尼科尔斯图获得系统的闭环频率响应。比如有这样一个开环频率特性函数，将其绘制在尼科尔斯图上，我们发现，与开环对数幅相图相切的等M圆应该介于二至三分贝之间，所以谐振峰值约为二点五分贝，相切点的频率为零点八，所以谐振频率为零点八。再看谐振峰值处对应的相角，介于负六十度到负九十度之间，取中间值是负七十五度，但相切点靠近负六十度，所以近似取负七十二度。我们再看，负三分贝等幅曲线相交点处的频率，靠近一点三五但比其小一点，所以近似取一点三三，对应闭环系统的带宽，关于带宽的概念随后会介绍。带宽频率下对应的相角靠近负一百五十度略小，近似取为负一百四十二度。"
  },
  {
    "title": "Nichols Chart Application 2",
    "title_html": "Nichols Chart Application 2",
    "items_html": "<div class=\"slide-item\">Consider a unit feedback system with a loop transfer function</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_c(j\\omega)G(j\\omega)=\\frac{0.64}{j\\omega[(j\\omega)^2+j\\omega+1]}</span></div>\n<div class=\"slide-item level-1\">The maximum magnitude 9 dB at <span class=\"math\">\\omega_r=0.88</span></div>\n<div class=\"slide-item level-1\">The gain margin: 3.5 dB</div>\n<div class=\"slide-item level-1\">The phase margin: <span class=\"math\">30^\\circ</span></div>\n<div class=\"slide-img\"><img src=\"images/img_170.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "再看尼科尔斯图的第二个应用。如果单位反馈系统的开环传递函数的形式G c G，在尼科尔斯图上找到与开环幅相图相切的等幅曲线，对应谐振峰值，不难发现是频率零点九附近的九分贝等幅曲线，所以谐振频率近似为零点八八，谐振峰值为九分贝。再看幅值裕量和相角裕量，找到与开环零分贝线和开环负一百八十度相角相交的开环幅相曲线上的交点，距离临界稳定点的水平距离即为相角裕量，从图上可以读出为三十度，垂直距离即为幅值裕量，从图上可以读出约为三点五分贝。由前面所学知识可知，根据谐振峰值和相角余量都可以估算出阻尼比，但我们发现，这个例子中，由两者估算出的阻尼比是不同的，由相角裕量估算出的阻尼比为零点三，而由谐振峰值估算出的阻尼比为零点一八，这也表明了，频域指标和时域指标之间的联系并不完全清晰和准确。估算结果差异较大的原因与频率特性曲线的形状有关，它从零分贝线迅速滑向了负一百八十度等N线。"
  },
  {
    "title": "System Bandwidth",
    "title_html": "System Bandwidth",
    "items_html": "<div class=\"slide-item\">The bandwidth <span class=\"math\">\\omega_B</span> of the closed-loop control system</div>\n<div class=\"slide-item level-1\">Range of fidelity 保真度 of response of the system</div>\n<div class=\"slide-item level-1\">Speed of response to a step input: proportional to <span class=\"math\">\\omega_B</span></div>\n<div class=\"slide-item level-1\">Settling time: inversely proportional to <span class=\"math\">\\omega_B</span></div>\n<div class=\"slide-item\">In systems where the low-frequency magnitude is 0dB on the Bode diagram, the <em>bandwidth</em> is measured at the -3dB frequency.</div>\n<div class=\"slide-item\">Compare <span class=\"math\">\\displaystyle T_1(s)=\\frac{100}{s^2+10s+100}\\quad {\\rm and}\\quad  T_2(s)=\\frac{900}{s^2+30s+900}</span></div>\n<div class=\"slide-item\">The system with the larger bandwidth provides the faster response.</div>\n<div class=\"slide-img\"><img src=\"images/img_171.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "闭环控制系统的带宽是度量系统的信号复现能力的最好参数。而且系统带宽与系统的阶跃响应速度成正比，与调整时间成反比。具体而言，系统带宽定义为，波德图低频段为零分贝的系统，幅值下降至负三分贝时对应的频率范围。比如这两个二阶闭环系统，它们的阻尼比是相同的，都是零点五，但自然频率分别是十和三十，根据调整时间的计算公式，阻尼相同的情况下，频率越高，调整时间越短，而对应的带宽越大，从图上可以看出，系统二的带宽明显大于系统一，与前面的分析吻合。"
  },
  {
    "title": "System Bandwidth",
    "title_html": "System Bandwidth",
    "items_html": "<div class=\"slide-item\">The system with a larger bandwidth provides a faster response.</div>\n<div class=\"slide-img\"><img src=\"images/img_172.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "这是两系统时域响应的对比，可以看出，带宽更大的系统二反应更快，调整时间更短，也验证了前面的分析结果。"
  },
  {
    "title": "The Stability of Control Systems with Time Delays",
    "title_html": "The Stability of Control Systems with Time Delays",
    "items_html": "<div class=\"slide-item\">Many control systems have a time delay within the closed loop of the system that affects the stability (and performance) of the system.</div>\n<div class=\"slide-item\">A time delay is the time interval between the start of an event at one point in a system and its resulting action at another point in the system.</div>\n<div class=\"slide-item\">The transfer function of a pure time delay (without attenuation) is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_d(s)=e^{-sT}</span></div>\n<div class=\"slide-item\">where <span class=\"math\">T</span> is the delay time.</div>",
    "items_count": 5,
    "notes": "许多控制系统有延时环节，会影响系统的稳定性和性能。时间延迟是系统某一时刻点上事件发生与另外一个时间点上产生结果之间的时间间隔。纯延时环节的传递函数可以表示成G d，时间T表示延迟时间。"
  },
  {
    "title": "",
    "title_html": "",
    "items_html": "<div class=\"slide-item\">The time delay does not introduce any additional poles or zeros within the contour, implying that the Nyquist criterion remains valid.</div>\n<div class=\"slide-item\">The Nyquist criterion can be utilized to determine the effect of the time delay on the relative stability of the feedback system.</div>\n<div class=\"slide-item\">The delay results in a phase shift <span class=\"math\">\\phi(\\omega)=-\\omega T</span></div>\n<div class=\"slide-item\">The loop transfer function is altered</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(j\\omega)=G_c(j\\omega)G(j\\omega)e^{-j\\omega T}</span></div>",
    "items_count": 5,
    "notes": "时间延迟并未引入额外的零点或极点，表明乃氏判据仍然适用，仍可用乃氏判据确定延时作用对反馈系统稳定性的影响。延时会导致相移增加，引入延时环节的开环传递函数为L j omega。"
  },
  {
    "title": "Liquid Level Control System",
    "title_html": "Liquid Level Control System",
    "items_html": "<div class=\"slide-item\">A level control with time delay</div>\n<div class=\"slide-item level-1\">Time delay: between the valve adjustment and the fluid output</div>\n<div class=\"slide-item\">The loop transfer function</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{31.5}{(s+1)(30s+1)((s^2/9)+(s/3)+1)}e^{-sT}</span></div>\n<div class=\"slide-item\">The time delay between the valve adjustment and the fluid output is <span class=\"math\">T = d/v</span></div>\n<div class=\"slide-item\">A time delay introduces an additional phase lag and results in a less stable system.</div>\n<div class=\"slide-img\"><img src=\"images/img_173.png\" alt=\"\"></div>",
    "items_count": 7,
    "notes": "比如，常见的液位控制系统，在阀门调节和液体流出之间就会引入时间延迟，其开环传递函数为L s。时间延迟常数T由流体流动速度与阀门至出口的距离决定，与流速成反比，与距离成正比。时间延迟引入额外相角滞后，会导致系统不稳定。"
  },
  {
    "title": "Liquid Level Control System",
    "title_html": "Liquid Level Control System",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_174.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "这是液位控制系统的方框图。"
  },
  {
    "title": "Bode plot for liquid level control system",
    "title_html": "Bode plot for liquid level control system",
    "items_html": "<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{31.5}{(s+1)(30s+1)((s^2/9)+(s/3)+1)}</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">20\\log ? = 5 \\rightarrow ?= 10^{5/20} = 1.77 \\rightarrow \\frac{31.5}{1.77} = 17.8</span></div>\n<div class=\"slide-img\"><img src=\"images/img_175.png\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "这是液位控制系统的开环波德图，为了方便对比，我们将引入延迟前后的相频特性曲线同时绘制在图上。如果不考虑延迟，系统的频率特性函数为L s。该系统有三个转折频率点，分别是三十分之一、一和三。这幅图的幅频特性曲线略去了低频水平部分，低频水平直线的幅值应该为二十倍的log三十一点一五，近似为三十分贝。经过频率三十分之一处，将转折负二十分贝每十倍频斜率，然后在频率一处再转折负二十斜率，在频率三处再转折负四十斜率，由此从起始低频率段逐个得出完整的幅频特性曲线渐近线。如果只考虑图示的频率段，起点应该这样计算，计算零点一频率处的幅值，分子比例环节仍取三十一点五，分母取第二个惯性环节，三十s加一分之一，因为该环节时间常数最短，这样，零点一频率时，分子三十一点五，分母的模为根号十，所以对应幅值应该为二十倍的三十一点五除以根号十，近似二十分贝，由此开始转折负二十，再在频率一处转折负二十，最后在频率三处再转折负四十。红色、蓝色分别为考虑延时和不考虑延时的相频特性曲线，我们可以看出，零分贝线对应相角较负一百八十度近似大三十五度，此即为相角裕量，但是引入延迟后，相角将接近负二百二十度，相角裕量变成负值，系统变得不稳定。为了使延迟系统仍有近三十度的相角裕量，必须减小系统增益，从图上可以估算至少得减少约五分贝，对应的增益系数为一点七七，所以，系统增益得调整为三十一点五除以一点七七，为十七点八。"
  },
  {
    "title": "*Pad​e* Approximation 帕德近似",
    "title_html": "*Pad​e* Approximation 帕德近似",
    "items_html": "<div class=\"slide-item\">The time delay <span class=\"math\">e^{-sT}</span> is nonrational (transcendental) funtion.</div>\n<div class=\"slide-item\">Pade approximation: approximate the time delay using a rational transfer function 使用有理函数近似超越函数.</div>\n<div class=\"slide-item\">By matching the coefficients based on the Maclaurin series</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">e^{-s T}=1-s T+\\frac{(s T)^{2}}{2 !}-\\frac{(s T)^{3}}{3 !}+\\frac{(s T)^{4}}{4 !}-\\frac{(s T)^{5}}{5 !}+\\cdots</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">e^{-sT}\\approx\\frac{n_1s+n_0}{d_1s+d_0}=\\frac{n_0}{d_0}+(\\frac{d_0n_1-n_0d_1}{d_0^2})s+(\\frac{d_1^2n_0}{d_0^3}-\\frac{d_1n_1}{d_0^2})s^2+\\cdots</span></div>\n<div class=\"slide-item\">A first order Pade approximation of the time delay is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">e^{-sT}\\approx\\frac{-\\frac{T}{2}s+1}{\\frac{T}{2}s+1}</span></div>",
    "items_count": 7,
    "notes": "我们知道，延时环节是一个无理函数，我们可以使用帕德近似将其转化为有理函数。将延时函数写成麦克劳林级数的形式，这是一种特殊的泰勒级数展开式。如果将延时环节近似为有理式，且将其也进行麦克劳林级数展开，根据上下两式对应系数相等的原则，可以得出n零等于d零，都等于一，n一等于负二分之T，d一等于二分之T。这就是延时环节的帕德近似表达式。"
  },
  {
    "title": "Design Example: Remotely Controlled Vehicle",
    "title_html": "Design Example: Remotely Controlled Vehicle",
    "items_html": "<div class=\"slide-item\">Design goal of the speed control system: achieve good overall control with a low steady-state error and a low-overshoot response to step commands.</div>\n<div class=\"slide-item\">Loop transfer function when <span class=\"math\">K = 20</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned}\nL(s) &amp; = G_c(s)G(s) \\\\\n&amp; = \\frac{10(1+s/2)}{(1+s)(1+s/2+s^2/4)}\n\\end{aligned}</span></div>\n<div class=\"slide-img\"><img src=\"images/img_176.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "接下我们讨论一个具体的设计实例。我们的设计目标是，获得较小的稳态误差，以及对阶跃响应的较小的超调量，达到良好的总体控制效果。b图是控制系统的方框图，如果取增益为二十，系统的开环传递函数可以表示成L s。"
  },
  {
    "title": "Nichols chart for EXAMPLE 9.11",
    "title_html": "Nichols chart for EXAMPLE 9.11",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_177.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_178.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_179.png\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "这是在不同K值情况下的尼柯尔斯图。我们发现，K等于二十时，与十二分贝对应的等幅曲线相切，所以谐振峰值为十二分贝，此外，与零分贝线相交点处近似位于负一百五到负一百八十度之间，所以相角裕量约为十五度，所以阻尼比约为零点一五，根据左下图阻尼比与超调量的关系，可以估算出零点一五阻尼比对应的超调量约为百分之六十。为减小超调量，可以减小增益。如果限定超调量不超过百分之二十，根据左下图阻尼比与超调量的关系，可以确定系统主根的阻尼比约为零点四五，再由左上图确定对应的谐振峰值为一点二五，转化为分贝值为两分贝。由尼柯尔斯图可以看出，K为二十对应的曲线，在频率二点八时与两分贝的等幅曲线相交，减小增益，使曲线下移，直至与两分贝等幅曲线相切，曲线整体下移约十三分贝，对应比例系数约为四点五，所以开环比例系数应调整为四点五分之二十，也就是四点四。调整后的曲线与零分贝线交点距负一百八十度垂线约为四十五度，对应阻尼比约为零点四五，与初始期望相吻合。"
  },
  {
    "title": "The response for EXAMPLE 9.11",
    "title_html": "The response for EXAMPLE 9.11",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_180.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_181.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "这是不同K值时，系统的时域响应曲线，可以看出，随着K值的减小，超调量减小了，但稳定误差却增加了。K取二十，超调量太大，K取四点四，稳态误差又太大，都不适合。取两者之间的中间值十。增益减小到十时，相比于原来的增益二十，是原来的零点五倍，二十倍的log零点五，是负六分贝。所以在尼柯尔斯图上，K为二十的曲线整体下移六分贝就得到K为十时的曲线。从尼柯尔斯图上可以看出，K为十时，对应的谐振峰值为七分贝，相角裕量约为二十六度，所以阻尼比约为零点二六，再查阻尼比与超调量的关系可知，对应的超调量约为百分之四十。"
  },
  {
    "title": "The response for EXAMPLE 9.11",
    "title_html": "The response for EXAMPLE 9.11",
    "items_html": "<div class=\"slide-item\">Steady state error</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\begin{aligned}\ne_{s s} &amp;=\\lim _{s \\rightarrow 0} s E(s)=\\lim _{s \\rightarrow 0} s\\left[\\frac{R(s)}{1+L(s)}\\right] \\\\\n&amp;=\\lim_{s \\rightarrow 0}\\frac{1}{1+L(s)}=\\frac{1}{1+K / 2}\n\\end{aligned}</span></div>\n<div class=\"slide-img\"><img src=\"images/img_182.png\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "由前面章节的知识我们知道，系统误差定义为期望输出减去实际输出，可以推导出来为，一加开环增益分之一再乘以输入。稳态误差是系统误差趋于稳定时候的值，根据终值定理，稳态误差存在的条件下，其值为系统误差乘以s，在s趋于零时的取值。不难得出，本例中稳态误差为一加二分之K的和分之一。将不同K值代入稳态误差公式，可以求出对应的稳态误差值，显然K值越大，稳态误差越小。这张表里显示了，不同K值对应的系统真实输出响应参数，包括超调量、调整时间、峰值时间以及稳态误差。"
  },
  {
    "title": "Steady-state effect of a unit step disturbance",
    "title_html": "Steady-state effect of a unit step disturbance",
    "items_html": "<div class=\"slide-item\">Steady-state effect of a unit step disturbance can be determined by using the final-value theorem with <span class=\"math\">R(s) = 0</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">y(\\infty)=\\lim _{s \\rightarrow 0} s\\left[\\frac{G(s)}{1+L(s)}\\right]\\left(\\frac{1}{s}\\right)=\\frac{1}{4+2 K}</span></div>\n<div class=\"slide-item\">The unit disturbance is reduced by the factor <span class=\"math\">4 + 2K</span>. For <span class=\"math\">K = 10</span>, we have <span class=\"math\">y(\\infty) = 1/24</span>, or the steady-state disturbance is reduced to 4% of the disturbance magnitude.</div>\n<div class=\"slide-img\"><img src=\"images/img_183.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "此外，我们考虑单位阶跃扰动下，系统的稳态输出。我们假定输入为零，且只有单位阶跃扰动时，应用终值定理计算系统的稳态输出，可以采用的计算式为y无穷。以扰动为输入时，系统的传递函数是表达式里方括号包含的部分，这可以根据梅逊公式轻易得出，因为前向通路增益为G，环路的增益为Gc G，且为负反馈。由此可以看出，单位扰动作用的缩小系数为四加二K，K为十时，缩小系数为二十四分之一，相当于扰动幅值减小约为原来的百分之四。"
  },
  {
    "title": "Hot Ingot Robot Control Example",
    "title_html": "Hot Ingot Robot Control Example",
    "items_html": "<div class=\"slide-item\">Hot ingot robot control system subject to time delay</div>\n<div class=\"slide-item\"><i>Goal</i>: minimize the tracking error in the presence of external disturbances while accounting for the known time delay.</div>\n<div class=\"slide-item\">Specifications</div>\n<div class=\"slide-item level-1\">Achieve a steady-state tracking error less than 10% for a step input</div>\n<div class=\"slide-item level-1\">Phase margin greater than 50<span class=\"math\">^\\circ</span> with the time-delay <span class=\"math\">T=\\pi/4</span> s</div>\n<div class=\"slide-item level-1\">Percent overshoot less than 10% for a step input</div>\n<div class=\"slide-item\">Consider P control and PI control.</div>",
    "items_count": 7,
    "notes": "热锭机器人控制系统也具有时间延迟特性。我们的设计目标是，考虑时间延迟的条件下减少外部干扰输入导致的跟踪误差。具体包括以下三个指标，第一，阶跃输入作用下稳态跟踪误差要小于百分之十；第二，四分之派延迟作用下，相角裕量要大于五十度；第三，阶跃输入时超调量低于百分之十。实现途径可以是比例控制，或是比例积分控制。"
  },
  {
    "title": "Artist's depiction of the system",
    "title_html": "Artist&#x27;s depiction of the system",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_184.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "这是热锭系统的示意图。机器人拾起热锭，将其置于淬火池中，视觉传感器测量热锭的实时位置，机器手抓取器的位置随导轨移动，也通过另外一个位置传感器进行测量，控制器根据热锭位置及抓取器位置的差值定位机器手到热锭的正上方，抓取热锭后沿导轨移动到淬火池上方，然后抓取器下移将热锭浸入淬火池，一定时间后提起，再沿轨道继续移动，将热锭释放到另一条传送带上。"
  },
  {
    "title": "Hot Ingot Robot Control with P Controller",
    "title_html": "Hot Ingot Robot Control with P Controller",
    "items_html": "<div class=\"slide-item\">When P control is used <span class=\"math\">G_c(s)=K</span> and ignoring the time-delay for the moment</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=G_c(s)G(s)=\\frac{K}{s^2+2s+1}</span></div>\n<div class=\"slide-item\">The steady-state tracking error</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">e_{ss}=\\lim\\limits_{s\\rightarrow0}sE(s)=\\frac{a}{1+K}</span></div>\n<div class=\"slide-item\">For the error to be less than 10%, it is required that <span class=\"math\">K\\geq 9</span>.</div>",
    "items_count": 5,
    "notes": "先考虑比例控制的情形，且忽略时间延迟，此时系统开环传递函数为L s。零型系统、阶跃输入条件下的稳态误差可以表示成一加K分之a，要想使稳态误差小于百分之十，要求K值不小于九。关于稳态误差计算可以参照前面四点六节和五点六节的内容。"
  },
  {
    "title": "",
    "title_html": "",
    "items_html": "<div class=\"slide-item\">When the gain <span class=\"math\">K</span> is 9</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(j\\omega)=G_c(j\\omega)G(j\\omega)=\\frac{9}{1-\\omega^2+2j\\omega}\\rightarrow \\frac{9}{\\sqrt{4\\omega^2 + (1-\\omega^2)^2}} = 1</span></div>\n<div class=\"slide-item\">The phase margin is 38.9<span class=\"math\">^\\circ</span> at <span class=\"math\">\\omega=2.83</span>rad/s</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\phi_{pm} = 180^\\circ - (180^\\circ - \\arctan\\frac{2\\omega}{\\omega^2 - 1}) = \\arctan\\frac{2\\times 2.83}{2.83^2 - 1} = 38.9^\\circ</span></div>\n<div class=\"slide-item\">The time delay <span class=\"math\">T</span> causes a phase lag without changing the magnitude plot</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\phi_{pm} = 180^\\circ - (180^\\circ - \\arctan\\frac{2\\omega}{\\omega^2 - 1}) - \\omega T = \\frac{\\pi 38.9^\\circ}{180^\\circ} - 2.83T = 0.679 - 2.83T &gt; 0</span></div>\n<div class=\"slide-item\">which implies that <span class=\"math\">T &lt; 0.24s</span>,  the system is stable.</div>\n<div class=\"slide-item\">As <span class=\"math\">T</span> is <span class=\"math\">\\pi/4</span>s, larger than 0.24s, so the system can not be stabilized by P control.</div>",
    "items_count": 8,
    "notes": "当K等于九时，计算乃氏图与单位幅值圆相交点处的剪切频率，根据开环频率特性函数，列出其幅值表达式，且令其为一，略去一个不合理根，解得剪切频率为二点八三弧度每秒。再计算剪切频率处对应的相角裕量，等于剪切频率对应相角与负一百八十度的差值，也就是一百八十度与剪切频率处相角的和。注意此处开环频率特性函数相角的表达式，分母实部与虚部的和，但是实部为负，相角处于第二象限，所以分母相角可以写成一百八十度减去锐角补角的形式，又因为在分母上，所以前面加负号。代入剪切频率可以得出K等于九时的相角裕量为三十八点九度，不满足设计要求。如果考虑时间延迟，幅频特性不会改变，但相角会进一步滞后，要想使系统稳定，相角裕量要大于零，这就要求时间延迟不能超过零点二四秒，而系统要求的四分之派秒远大于系统稳定需要的零点二四秒，所以单纯使用比例控制无法使系统在达到设计要求的条件下还满足稳定条件。"
  },
  {
    "title": "Bode plot with \\(K = 9\\)",
    "title_html": "Bode plot with <span class=\"math\">K = 9</span>",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_185.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "这是K等于九时，不考虑延迟条件下的开环系统的波德图。可以清楚地看出，幅频曲线与零分贝线相交的二点八频率处，此即剪切频率，对的相角高于负一百八十度三十八点九度，此即相角裕量，相角无限趋近于负一百八十度而不相交，所以对应的幅值裕量为无穷大。也就是不引入延迟的条件下系统是稳定的。"

  {
    "title": "Hot Ingot Robot Control with P Controller",
    "title_html": "Hot Ingot Robot Control with P Controller",
    "items_html": "<div class=\"slide-item\">The Nyquist plot of the P-controlled system in the absence of time delay</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{K}{(s+1)^2}</span></div>\n<div class=\"slide-item\">The number of openloop poles of <span class=\"math\">L(s)</span> in the right half-plane, <span class=\"math\">P = 0</span>.</div>\n<div class=\"slide-item\">The net number of encirclement of the -1 point, <span class=\"math\">N = 0</span></div>\n<div class=\"slide-item\">The number of closed-loop poles in the tight half-plane, <span class=\"math\">Z = N+P = 0</span>.</div>\n<div class=\"slide-item\">The delay-free system is stable when <span class=\"math\">K = 9</span>.</div>\n<div class=\"slide-img\"><img src=\"images/img_186.png\" alt=\"\"></div>",

    "notes": "再看只有比例控制时的乃氏图。我们仍先不考虑时间延迟，开环不具有右极点，所以P等于零，此时的乃氏图也不包围负一点，因此N也等于零，由此计算出Z等于零，所以可以推导出闭环系统也不具有右零点，因此无延迟的比例控制是稳定的，与前面波德图的分析结论是一致的。"
  },
  {
    "title": "Hot Ingot Robot Control with P Controller",
    "title_html": "Hot Ingot Robot Control with P Controller",
    "items_html": "<div class=\"slide-item\">In the presence of time delay, the loop transfer function becomes</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{Ke^{-sT}}{(s+1)^2}</span></div>\n<div class=\"slide-item\">The number of openloop poles of <span class=\"math\">L(s)</span> in the right half-plane, <span class=\"math\">P = 0</span>.</div>\n<div class=\"slide-item\">The net number of encirclement of the -1 point, <span class=\"math\">N = 2</span>.</div>\n<div class=\"slide-item\">The number of closed-loop poles in the right half-plane, <span class=\"math\">Z=N+P=2</span>.</div>\n<div class=\"slide-item\">The system is unstable when <span class=\"math\">K = 9</span> and time-delay is <span class=\"math\">\\pi/4</span>s.</div>\n<div class=\"slide-img\"><img src=\"images/img_187.png\" alt=\"\"></div>",
    "items_count": 7,
    "notes": "如果考虑延迟，同样开环系统不具有右极点，P等于零，而加入四分之派延迟环节的乃氏图将顺时针包围负一点两圈，所以N等于二，由此可计算出Z等于二，所以可以推断出对应闭环系统有两个右极点，所以四分之派延迟，比例系数九时系统不稳定。"
  },
  {
    "title": "Nyquist plot with various time-delays K = 9",
    "title_html": "Nyquist plot with various time-delays K = 9",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_188.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "事实上，在不改变比例系数的情况下，可以调节延迟时间使系统达到稳定。T等于零就是不加入延时，T为零点二四将达到边界稳定，T等零点七八，也就是系统设计目标四分之派，系统将变得不稳定。"
  },
  {
    "title": "Hot Ingot Robot Control with PI Controller",
    "title_html": "Hot Ingot Robot Control with PI Controller",
    "items_html": "<div class=\"slide-item\">Consider the PI control</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_c(s)=K_p+\\frac{K_l}{s}</span></div>\n<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=G_c(s)G(s)=\\frac{K_Ps+K_l}{s}\\frac{K}{(s+1)^2}e^{-sT}</span></div>\n<div class=\"slide-item\">The steady-state error requirement can be easily met as the system is of type 1.</div>\n<div class=\"slide-item\">For <span class=\"math\">P.O.\\leq10\\%</span>, the corresponding damping ratio <span class=\"math\">\\zeta\\geq 0.59</span></div>\n<div class=\"slide-item\">Note that <span class=\"math\">\\zeta</span> is related to the phase margin by</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">\\zeta\\approx\\frac{P.M.}{100}</span></div>\n<div class=\"slide-item\">A phase margin of 60<span class=\"math\">^\\circ</span> is thus desired.</div>\n<div class=\"slide-img\"><img src=\"images/img_189.png\" alt=\"\"></div>",
    "items_count": 9,
    "notes": "如果使用比例积分控制器，其开环传递函数可以写成G c，该开环系统为一型系统，对阶跃输入的稳态误差为零，自然能达到系统设计要求。超调量不超过百分之十，对应阻尼比要大于零点五九。根据阻尼比与相角裕量的关系，可以得出相角裕量至少要六十度。"
  },
  {
    "title": "The uncompensated system",
    "title_html": "The uncompensated system",
    "items_html": "<div class=\"slide-item formula\"><span class=\"math-block\">L(s)=\\frac{9}{(s+1)^2}e^{-sT}\\quad T =\\pi/4</span></div>\n<div class=\"slide-item\">Phase margin  at <span class=\"math\">\\omega_c=2.83</span>: <span class=\"math\">\\phi_{pm} = 38.9^\\circ - 2.83\\times \\frac{\\pi}{4} \\times \\frac{180^\\circ}{\\pi} = -88.45^\\circ</span></div>\n<div class=\"slide-item\">The frequency is <span class=\"math\">\\omega=0.87</span> when the phase is -120<span class=\"math\">^\\circ</span></div>\n<div class=\"slide-item\">At this frequency, the magnitude is about 14.5 dB.</div>\n<div class=\"slide-item\">A reduction of gain of 14.5 dB is required.</div>\n<div class=\"slide-img\"><img src=\"images/img_190.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "如果不使用控制器对系统进行调控，我们可以计算出延时四分之派秒时系统的相角裕量为负八十八点四五度，显然系统无法稳定。要想使系统稳定且还具有六十度的相角裕量，其相角本身应为负一百二十度，我们在波德图上找到负一百二十度相角对应的频率，为零点八七，向上反推出幅值对应为十四点五分贝。经过上述分析可知，要达到设计要求，幅值应衰减十四点五分贝，也就是让幅频曲线下移，以使其剪切频率减小到零点八七，这样才能保证相解裕量为六十度。"
  },
  {
    "title": "Hot Ingot Robot Control with PI Controller",
    "title_html": "Hot Ingot Robot Control with PI Controller",
    "items_html": "<div class=\"slide-item\">The PI controller must be designed to provide the gain reduction</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_c(s)=K_P+\\frac{K_I}{s}=K_P\\frac{s+\\frac{1}{\\tau}}{s} = K_I\\frac{1 + \\tau s}{s}\\quad \\tau=\\frac{K_P}{K_I}</span></div>\n<div class=\"slide-item level-1\">Low pass nature</div>\n<div class=\"slide-item level-1\">High gain and -90<span class=\"math\">^\\circ</span> phase at low frequency</div>\n<div class=\"slide-item level-1\">Place the break frequency <span class=\"math\">(1/\\tau)</span> below the crossover frequency so that the phase margin is not reduced significantly.</div>\n<div class=\"slide-item\">To have 14.5 dB gain reduction</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">20\\log K_P = -14.5 \\rightarrow K_P=10^{-(14.5/20)}=0.188</span></div>\n<div class=\"slide-item\">To avoid phase margin degradation</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">1/\\tau=K_I/K_P=0.1\\omega_c \\longrightarrow \\omega_c=0.87 \\ \\text{and}\\ K_I=0.0164</span></div>\n<div class=\"slide-item\">The PI controller is</div>\n<div class=\"slide-item formula\"><span class=\"math-block\">G_c(s) = \\frac{0.188s+0.0164}{s}</span></div>",
    "items_count": 11,
    "notes": "接下来我们就看如何能使幅频特性曲线下移十四点五分贝。对控制环节进行变形，提出一个比例常数K p来，如果用K p来进行增益补偿，使原系统幅值有十四点五的减小，可以确定出K p的取值。为避免相角裕量减少太多，转角频率要尽量远离剪切频率零点八七，通常取零点一倍的剪切频率，这样可以确定出积分常数来。最后确定的比例积分控制器为G c。"
  },
  {
    "title": "Hot Ingot Robot Control with PI Controller",
    "title_html": "Hot Ingot Robot Control with PI Controller",
    "items_html": "<div class=\"slide-item\">The resulting gain margin is 5.3 dB and phase margin is 56.5<span class=\"math\">^\\circ</span>.</div>\n<div class=\"slide-item\">The P.O. is evaluated to be 4.2%.</div>\n<div class=\"slide-img\"><img src=\"images/img_191.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_192.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "最后我们绘制出系统的波德图，可以发现，其幅值裕量为五点三分贝，相角裕量为五十六点五度，超调量百分之四点二，满足设计要求。"
  },
  {
    "title": "Summary",
    "title_html": "Summary",
    "items_html": "<div class=\"slide-item\">The stability of a feedback control system can be determined in the frequency domain by utilizing Nyquist&#x27;s criterion.</div>\n<div class=\"slide-item\">Nyquist&#x27;s criterion provides the assessment of relative stability: gain margin and phase margin.</div>\n<div class=\"slide-item\">The correlation between frequency domain and transient response</div>\n<div class=\"slide-item level-1\">Constant M and constant N circles</div>\n<div class=\"slide-item level-1\">Nichols chart</div>\n<div class=\"slide-item\">Time delay systems</div>",
    "items_count": 6,
    "notes": "最后总结一下本章的内容。重点和难点是利用乃氏判据进行反馈控制系统频域内的稳定性判定。乃氏稳定性判据也能提供相对稳定性的评估，主要包括两个指标，幅值裕量和相角裕量。我们还讨论了频域响应及瞬态响应之间的关联性，主要通过M圆和N圆来表征，以及M圆和N圆在对数幅相图上同时显示时所形成的尼柯尔斯图。最后我们讨论了考虑延时因素的系统稳定性问题及校正途径。"
