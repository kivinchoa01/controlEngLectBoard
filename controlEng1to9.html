<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>板书课件</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0f05; margin: 0; overflow: hidden;
    font-family: sans-serif;
  }
  .board {
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, #1a3a1a 0%, #0f2a0f 60%, #0a1f0a 100%);
    border: 10px solid #5a3a1a; border-radius: 0;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.3);
    position: relative; overflow: hidden; padding: 20px 4px 14px 28px;
  }
  .board-scroll {
    height: 100%; overflow-y: auto; overflow-x: hidden;
    padding-right: 28px; padding-bottom: 50px;
    position: relative;
  }
  .board-scroll::-webkit-scrollbar { width: 6px; }
  .board-scroll::-webkit-scrollbar-track { background: transparent; }
  .board-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .board::before {
    content: ''; position: absolute; top:0;left:0;right:0;bottom:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    pointer-events: none; z-index: 5;
  }
  .board::after {
    content: ''; position: absolute; top:0;left:0;right:0;bottom:0;
    background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 5;
  }
  .slide-content { position: relative; z-index: 2; min-height: 540px; display: flex; flex-direction: column; }
  .slide-title {
    font-size: 30px; color: rgba(255,255,255,0.88); text-align: center;
    font-family: "STKaiti","KaiTi",serif; text-shadow: 0 0 8px rgba(255,255,255,0.15);
    padding-bottom: 10px; margin-bottom: 14px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
  }
  .slide-items { flex: 1; display: flex; flex-direction: column; gap: 5px; padding: 2px 8px; }
  .slide-item {
    font-size: 21px; color: rgba(255,255,255,0.8);
    font-family: "STKaiti","KaiTi",serif; line-height: 1.7;
    opacity: 0; transform: translateX(-10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    padding: 2px 6px;
  }
  .slide-item.show { opacity: 1; transform: translateX(0); }
  .slide-item.sub { font-size: 18px; color: rgba(255,255,255,0.55); padding-left: 26px; }
  .slide-item.level-1 { font-size: 18px; color: rgba(255,255,255,0.6); padding-left: 18px; }
  .slide-item.level-2 { font-size: 16px; color: rgba(255,255,255,0.45); padding-left: 34px; }
  .slide-item.level-3 { font-size: 15px; color: rgba(255,255,255,0.35); padding-left: 50px; }
  .slide-item .katex { font-size: 1.05em; }
  .slide-item em { color: #ffd; font-style: italic; }
  .slide-item i { color: rgba(200,220,255,0.8); }
  .slide-item code {
    font-size: 0.85em; padding: 1px 5px; border-radius: 3px;
    background: rgba(0,0,0,0.2); color: rgba(200,220,100,0.85);
  }

  /* 公式独立行 */
  .math-block {
    margin: 6px 0; padding: 8px 14px;
    background: rgba(0,0,0,0.15); border-radius: 4px;
    border-left: 3px solid rgba(255,200,100,0.2);
  }
  .math-block .katex { font-size: 1.15em; }
  .slide-item.formula { opacity: 0; transition: opacity 0.5s; }
  .slide-item.formula.show { opacity: 1; }
  .slide-item.formula { transform: none !important; }

  /* 代码块 */
  .slide-item.code-block { opacity: 0; transition: opacity 0.5s; }
  .slide-item.code-block.show { opacity: 1; }
  .slide-item.code-block { transform: none !important; }
  .slide-item.code-block pre {
    margin: 6px 0; padding: 8px 12px; border-radius: 4px;
    background: rgba(0,0,0,0.25); overflow-x: auto;
    font-size: 13px; line-height: 1.5;
  }
  .slide-item.code-block code {
    background: none; padding: 0;
    color: rgba(200,220,100,0.85);
  }

  /* 图片占位符 */
  .img-placeholder {
    margin: 8px 0; padding: 14px; text-align: center;
    border: 1px dashed rgba(255,255,255,0.15); border-radius: 4px;
    background: rgba(0,0,0,0.1);
    font-size: 14px; color: rgba(255,255,255,0.3);
    font-family: "STKaiti",serif;
    opacity: 0; transition: opacity 0.4s;
  }
  .img-placeholder.show { opacity: 1; }

  /* 提取的插图 */
  .slide-img {
    margin: 6px 0; opacity: 0; transition: opacity 0.5s; text-align: center;
  }
  .slide-img.show { opacity: 1; }
  .slide-img img { max-width: 100%; max-height: 300px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* 讲课词面板 */
  .notes-panel {
    position: absolute; right: 0; top: 0; width: 360px; max-height: 100%;
    background: rgba(8,18,8,0.95); border-left: 2px solid rgba(255,200,100,0.2);
    padding: 18px 20px; overflow-y: auto; z-index: 10;
    font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.8;
    font-family: "STKaiti",serif;
    transform: translateX(100%); transition: transform 0.35s ease;
  }
  .notes-panel.open { transform: translateX(0); }
  .notes-panel .label {
    font-size: 12px; color: rgba(255,200,100,0.4); margin-bottom: 8px;
    font-family: sans-serif; letter-spacing: 2px;
  }

  /* 目录面板 */
  .toc-panel {
    position: absolute; left: 0; top: 0; width: 320px; max-height: 100%;
    background: rgba(8,18,8,0.95); border-right: 2px solid rgba(255,200,100,0.2);
    padding: 18px 16px; overflow-y: auto; z-index: 10;
    font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6;
    font-family: "STKaiti",serif;
    transform: translateX(-100%); transition: transform 0.35s ease;
  }
  .toc-panel.open { transform: translateX(0); }
  .toc-panel .toc-chapter {
    margin: 10px 0 4px 0; font-size: 15px; color: rgba(255,200,100,0.6);
    cursor: pointer; padding: 4px 6px; border-radius: 3px;
  }
  .toc-panel .toc-chapter:hover { background: rgba(255,255,255,0.05); }
  .toc-panel .toc-slide {
    margin: 1px 0 1px 16px; font-size: 12px; color: rgba(255,255,255,0.35);
    cursor: pointer; padding: 2px 6px; border-radius: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toc-panel .toc-slide:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); }
  .toc-panel .toc-label {
    font-size: 12px; color: rgba(255,200,100,0.4); margin-bottom: 10px;
    font-family: sans-serif; letter-spacing: 2px;
  }


  /* 按键提示 */
  .keyhint {
    position: absolute; left: 14px; bottom: 12px; z-index: 6;
    font-size: 11px; color: rgba(255,255,255,0.1); font-family: sans-serif;
  }

  .controls {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
    display: flex; gap: 8px; align-items: center;
    padding: 8px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.5));
  }
  .controls .page-jump { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .controls .page-jump input {
    width: 54px; padding: 4px 6px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px; background: rgba(0,0,0,0.3); color: #ccc; font-size: 13px; text-align: center;
  }
  .controls .page-jump label { color: rgba(255,255,255,0.3); font-size: 12px; font-family: sans-serif; }
  .controls button {
    padding: 6px 18px; border: none; border-radius: 4px;
    background: #5a3a1a; color: #ccc; font-size: 13px; cursor: pointer;
  }
  .controls button:hover { background: #7a5a3a; }

  .speech-controls {
    display: flex; gap: 6px; align-items: center;
    margin-left: 2px; padding: 0 6px;
    border-left: 1px solid rgba(255,255,255,0.1); font-size: 12px;
  }
  .speech-controls label { color: rgba(255,255,255,0.5); font-size: 11px; white-space: nowrap; cursor: default; }
  .speech-controls input[type=range] {
    width: 58px; height: 4px; margin: 0 1px; vertical-align: middle;
    accent-color: #e8c840;
  }
  .speech-controls select {
    padding: 2px 4px; border: 1px solid rgba(255,255,255,0.25); border-radius: 3px;
    background: #1a1a1a; color: #ddd; font-size: 11px; max-width: 110px;
    cursor: pointer;
  }
  .speech-controls select:hover { border-color: rgba(255,200,100,0.4); }
  .speech-controls .rate-val {
    color: rgba(255,255,255,0.3); font-size: 10px; min-width: 22px; text-align: center;
  }

  .hint-text {
    position: absolute; left: 0; right: 0; bottom: 42px; z-index: 20;
    text-align: center; font-size: 12px; color: rgba(255,255,255,0.15);
    font-family: sans-serif; pointer-events: none;
  }

  .empty-slide {
    flex:1; display:flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,0.15); font-size:18px; font-family:"STKaiti",serif;
  }

  /* 画笔工具 */
  #drawCanvas {
    position: absolute; top: 0; left: 0;
    z-index: 6; cursor: crosshair;
    pointer-events: none; touch-action: none;
  }
  #drawCanvas.active { pointer-events: auto; }

  .pen-controls {
    display: flex; gap: 4px; align-items: center;
    margin-left: 4px; padding: 0 4px;
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  .pen-toggle {
    padding: 4px 10px !important; font-size: 12px !important;
  }
  .pen-toggle.active { background: #7a5a3a !important; color: #ffd !important; }
  .pen-clr {
    padding: 4px 8px !important; font-size: 11px !important;
    background: rgba(100,40,40,0.5) !important;
  }
  .pen-clr:hover { background: rgba(140,60,60,0.7) !important; }
  .pen-color-row { display: flex; gap: 3px; align-items: center; }
  .pen-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer; padding: 0; display: inline-block; flex-shrink: 0;
    transition: border 0.15s, box-shadow 0.15s;
  }
  .pen-btn.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); }
  .pen-width {
    width: 50px; height: 4px; cursor: pointer;
    accent-color: #e8c840;
  }
</style>
</head>
<body>

<div class="board" id="board">
  <div class="board-scroll">
  <div class="slide-content" id="slideContent">
    <div class="slide-title" id="slideTitle"></div>
    <div class="slide-items" id="slideItems"></div>
    <div class="empty-slide" id="emptySlide" style="display:none;">%%L_EMPTY_SLIDE%%</div>
  </div>
  <canvas id="drawCanvas"></canvas>
  </div>
  <div class="notes-panel" id="notesPanel">
    <div class="label">讲 课 词</div>
    <div id="notesText"></div>
  </div>
  <div class="toc-panel" id="tocPanel">
    <div class="toc-label">目 录</div>
    <div id="tocContent"></div>
  </div>
  <!-- page indicator moved into controls below -->
  <div class="keyhint">← → 翻页 &nbsp;|&nbsp; 空格逐步显示 &nbsp;|&nbsp; N 讲课词/朗读 &nbsp;|&nbsp; T 目录 &nbsp;|&nbsp; G 跳转</div>
  <div class="controls">
    <button onclick="event.stopPropagation();prevPage()">← 上一页</button>
    <button onclick="event.stopPropagation();doNextPage()">下一页 →</button>
    <button onclick="event.stopPropagation();toggleNotes()">讲课词</button>
    <label style="color:rgba(255,255,255,0.5); font-size:13px; margin-left:4px; cursor:pointer; user-select:none;">
      <input type="checkbox" id="readNotesCheck"> 读
    </label>
    <span class="speech-controls" id="speechControls">
      <label>语速</label>
      <input type="range" id="speechRate" min="0.3" max="2" step="0.1" value="1" list="rateMarks" title="朗读语速">
      <span class="rate-val" id="rateVal">1.0</span>
      <datalist id="rateMarks">
        <option value="0.5" label="慢"></option>
        <option value="1.0" label="正常"></option>
        <option value="1.5" label="快"></option>
        <option value="2.0" label="最快"></option>
      </datalist>
      <select id="voiceSelect"><option value="">默认语音</option></select>
    </span>
    <button onclick="event.stopPropagation();toggleToc()">目录</button>
    <label style="color:rgba(255,255,255,0.5); font-size:13px; margin-left:6px; cursor:pointer; user-select:none;">
      <input type="checkbox" id="showAllCheck"> 整页显示
    </label>
    <div class="pen-controls" id="penControls">
      <button class="pen-toggle" id="penToggle" onclick="event.stopPropagation();togglePen()">画笔</button>
      <button class="pen-clr" id="penClear" onclick="event.stopPropagation();clearCanvas()" title="清除笔迹">清除</button>
      <span class="pen-color-row">
        <button class="pen-btn active" style="background:#e8c840" data-color="#e8c840" onclick="event.stopPropagation();setPenColor('#e8c840')" title="黄色"></button>
        <button class="pen-btn" style="background:#d44" data-color="#d44" onclick="event.stopPropagation();setPenColor('#d44')" title="红色"></button>
        <button class="pen-btn" style="background:#4a4" data-color="#4a4" onclick="event.stopPropagation();setPenColor('#4a4')" title="绿色"></button>
      </span>
      <input type="range" class="pen-width" id="penWidth" min="1" max="12" value="3" oninput="setPenWidth(this.value)" title="笔触粗细">
    </div>
    <span class="page-jump">
      <span style="color:rgba(255,255,255,0.2); font-size:14px; margin-right:6px;">
        <span id="pageCur">1</span>/<span id="pageTotal">1</span>
      </span>
      <label>跳转</label>
      <input type="number" id="pageJump" min="1" value="1" onkeydown="if(event.key==='Enter')jumpToPage()">
      <button onclick="event.stopPropagation();jumpToPage()">Go</button>
    </span>
  </div>
  <div class="hint-text" id="hintText">空格逐步显示 · 方向键切换页面</div>
</div>

<script>
const SLIDES = [
  {
    "title": "Course Information",
    "title_html": "Course Information",
    "items_html": "<div class=\"slide-item\">机械工程控制基础（双语）</div>\n<div class=\"slide-item\">32学时，两个学分</div>\n<div class=\"slide-item\">Modern Control Systems, 14rd Ed, Richard C. Dorf, Robert H. Bishop, Pearson. 2022</div>\n<div class=\"slide-item\">成绩构成</div>\n<div class=\"slide-item level-2\">平时成绩 20 % ： 随机课堂小测验、签到、作业</div>\n<div class=\"slide-item level-2\">实验成绩 10 %</div>\n<div class=\"slide-item level-2\">期末成绩 70 % ： 填空、选择、分析、计算</div>\n<div class=\"slide-img\"><img src=\"images/img_000.png\" alt=\"\"></div>",
    "items_count": 8,
    "notes": "本门课程机械工程控制基础是双语课，32学时，两学分。使用的教材是 Modern Control System, 目前该教材已出版至第14版。课程成绩由三部分组成，平时成绩占20 \\%，通过课堂随机测验、签到和作业完成情况来评定；实验成绩占10 \\%，包括两个实操实验；期末成绩占 70\\%，题型包括填空、选择、分析和计算等。"
  },
  {
    "title": "Quote from the Preface",
    "title_html": "Quote from the Preface",
    "items_html": "",
    "items_count": 0,
    "notes": "这本教材前言中有关教学方法的论述非常值得大家思考，作者认为，理想的教学方法是向学生提出一系列问题，并给出部分过去已有的结果。传统方法不重视向学生提出问题而是直接给出完整的答案，剥夺了学生感受刺激和兴奋的机会，因而与创造冲动无缘，同时也将人类获得科技进步的探索变成了一堆干巴巴的定理。教学的最高境界是向学生提供一些我们当前面临的、重要但尚无答案的问题，由学生自己去寻找答案。"
  },
  {
    "title": "Through and Across Parameters",
    "title_html": "Through and Across Parameters",
    "items_html": "<div class=\"slide-item\">She walked through (通过) the pool.</div>\n<div class=\"slide-item\">She walked across (跨过) the pool.</div>\n<div class=\"slide-item\">Through — Variables (通过型变量) that are measured with a gauge connected in <i>series</i> to an element.</div>\n<div class=\"slide-item\">Across — Variables (跨越型变量) that are measured with a gauge connected in <i>parallel</i> to an element.</div>\n<div class=\"slide-item\">Sensitivity</div>\n<div class=\"slide-item\">Examples</div>",
    "items_count": 6,
    "notes": "在这本教材中，提出通过型和跨越型变量的概念。through和across的差别可以用这两个例句感受一下，前一句是指通过、穿过泳池，而后句是指从泳池的一边跨过另一边，并没有与水接触。类似的，通过型变量指需要用仪器跟被测元件串联起来测量的变量，比如电流、力、流量等，而跨越型变量是指需要用仪器跟元件并联起来测量的变量，如电压差、速度差、温度差等。这两种变量对统一电气、机械、热力和流体系统的数学表达起到了重要作用。本教材还提出了系统灵敏度概念，详细分析干扰信号、测量信号对于系统输出响应的影响。这一条十分重要！这一点国内教材通常没有涉及。教材每章还引入了循序渐进实例，将每一章的知识点穿插在实例中，突出理论联系实际。"
  },
  {
    "title": "Syllabus",
    "title_html": "Syllabus",
    "items_html": "<div class=\"slide-item\">Chapter 1 Introduction to control systems</div>\n<div class=\"slide-item\">Chapter 2 Mathematical models of systems</div>\n<div class=\"slide-item\">Chapter 4 Feedback control system characteristics</div>\n<div class=\"slide-item\">Chapter 5 The performance of feedback control systems</div>\n<div class=\"slide-item\">Chapter 6 The stability of linear feedback systems</div>\n<div class=\"slide-item\">Chapter 8 Frequency response methods</div>\n<div class=\"slide-item\">Chapter 9 Stability in frequency domain</div>",
    "items_count": 7,
    "notes": "我们讲解的内容主要涉及教材的第1、2、4、5、6、8、9章，第1章是绪论，第2章是控制系统的数学模型，第4章反馈控制系统的特征，第5章反馈控制系统的性能，第6章线性反馈控制的稳定性，第8章频域响应方法，第9章频域内的稳定性，第三章状态变量模型和第七章根轨迹法以及第十章以后的内容限于学时原因，本课程不涉及。"
  },
  {
    "title": "Course Objectives（课程目标）",
    "title_html": "Course Objectives（课程目标）",
    "items_html": "<div class=\"slide-item\">Control engineers have traditionally played an important role in industrial automation and space exploration. The objectives of the course are</div>\n<div class=\"slide-item level-1\">Appreciate the <i>value of feedback control</i> in various engineering and non-engineering disciplines.</div>\n<div class=\"slide-item level-1\">Acquire a systematic approach in addressing and solving a problem</div>\n<div class=\"slide-item level-2\">Modeling（建模）</div>\n<div class=\"slide-item level-2\">Analysis（分析）</div>\n<div class=\"slide-item level-2\">Design（设计）</div>\n<div class=\"slide-item level-2\">Implementation（实现）</div>\n<div class=\"slide-item level-2\">Test（测试）</div>",
    "items_count": 8,
    "notes": "控制工程在工业自动化、太空探索领域发挥着重要作用，通过本门课程的学习，大家能体会到，工程及非工程学科中，反馈控制的重要价值。反馈概念会贯穿课程始终。掌握阐述问题及解决问题的系统方法，能够建立被研究系统的物理模型，并用数学手段进行表征和分析，进而设计出满足使用要求的控制系统模型，最后通过硬件制作实现相应的控制功能，并进行测试验证。这是我们通过本课程学习需要掌握的基本知识，分散在刚才所列的各章节中。重点掌握前两点，建模和分析，第二章侧重建模方法，其余章节侧重分析和设计。"
  },
  {
    "title": "",
    "title_html": "",
    "items_html": "",
    "items_count": 0,
    "notes": "熟悉分析、设计中需要掌握的技巧，包括系统稳定性判据，一个是劳斯判据，另一个是乃氏判据，这是本门课程的重点更是难点。我们可以根据建立的系统模型判定出系统是否稳定，通俗点讲，就是当系统受到外界扰动后能否重新达到稳定状态。另一方面是对系统性能进行表征，判断出系统什么时候达到稳定，稳定的水平如何。当然每种分析方法也有自身的局限性。我们还要熟悉一些计算机辅助分析工具的使用方法，特别是matlab软件。对于现在的工科生来说，MATLAB已经成为必备神器，其重要性可能与office有得一拼，已经渗透到数值计算、机械化工、建模仿真、汽车航空、电力能源等学术研究和工业制造领域。"
  },
  {
    "title": "Control Engineering",
    "title_html": "Control Engineering",
    "items_html": "<div class=\"slide-item\">A multi-disciplinary course（多学科交叉课程）</div>\n<div class=\"slide-item level-1\">Feedback theory (反馈理论)</div>\n<div class=\"slide-item level-1\">Linear system analysis线性系统分析</div>\n<div class=\"slide-item level-1\">Network theory网络理论</div>\n<div class=\"slide-item level-1\">Communication theory通信理论</div>\n<div class=\"slide-item\">Applicable to aeronautical, chemical, mechanical, enviromental, civil, and electrical engineering.</div>\n<div class=\"slide-item\">Role of control in EE curriculum（电气工程类课程中控制的角色）</div>\n<div class=\"slide-item level-1\">Electronics 电子</div>\n<div class=\"slide-item level-1\">Semiconductor 半导体</div>\n<div class=\"slide-item level-1\">Communication 通讯</div>\n<div class=\"slide-item level-1\">Network 网络</div>\n<div class=\"slide-item level-1\">Power 电力</div>\n<div class=\"slide-item level-1\">Instrumentation 仪器</div>",
    "items_count": 13,
    "notes": "必须强调的是，本课程是一门多学科交叉的课程，涉及反馈理论、线性系统分析理论、网络理论、通信理论等。这门课程可以应用于航天、化工、机械、环境、土建以及电气工程等领域，适用范围非常广泛。在电气工程类课程中的作用尤为突出，在电子、半导体、通讯、网络、电力、仪器仪表等方面发挥着极为重要的作用。因此，本课程的多学科性不仅反映在需要的基础理论学科广泛，而且应用领域同样广泛。"
  },
  {
    "title": "Control System",
    "title_html": "Control System",
    "items_html": "<div class=\"slide-item\">A <i>control system</i> is an interconnection of components forming a system configuration that will provide a desired system response.</div>\n<div class=\"slide-item\">A component or process to be controlled is representd by a block（方框）</div>\n<div class=\"slide-item\">The input-output relationship represents the cause-and-effect relationship （因果关系）of the process.</div>\n<div class=\"slide-item\">Depending on the system configuration, there are two kinds of control systems</div>\n<div class=\"slide-item level-1\">Open-loop control system 开环控制系统</div>\n<div class=\"slide-item level-1\">Closed-loop control system 闭环控制系统</div>\n<div class=\"slide-img\"><img src=\"images/img_001.png\" alt=\"\"></div>",
    "items_count": 7,
    "notes": "控制系统是由不同组件相互连接形成、能实现某种预期响应输出的系统。比如体温计就代表了一个简单的控制系统。测体温前先将体温计甩至三十五度以下，然后夹在腋窝下，等五分钟后拿出来读数。由此可以看出，体温计的输出具有时间相关的特性，因此该系统是动态系统，体现出了一种因果关系。单输入、单输出系统（英文简写为SISO）可以用方框图来表示。方框用来表示被控制对象或系统，输入输出的箭头方向代表了信号或是信息在系统里的流动方向。根据系统构型的不同，有两类控制系统，分别是开环控制系统和闭环控制系统，接下来通过具体实例对这两类控制系统进行说明。"
  },
  {
    "title": "Open-Loop Control System 开环系统",
    "title_html": "Open-Loop Control System 开环系统",
    "items_html": "<div class=\"slide-item\">An <i>open-loop control system</i> utilizes a controller or control actuator to obtain the desired system response.</div>\n<div class=\"slide-item\">An open-loop control system is a system without feedback.</div>\n<div class=\"slide-img\"><img src=\"images/shooting.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_002.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "开环系统只使用了控制器或是执行元件以获得期望的系统响应，不具有反馈环节。举一个射击的例子。打靶时，枪手会瞄准靶标，启动扳机、子弹射出，最后不管子弹落在何处，总之会产生一个输出的响应。这个例子中控制系统包括的对象有，靶心位置，枪手，枪，子弹，子弹在靶子上的落点位置，对这些对象进行具体的功能说明，即可发现，瞄准的靶心位置即是控制系统的输入信号，枪手是控制器，枪是执行器，子弹是被控对象，子弹的实际落点为输出。显然，枪手扣动扳机前会依据靶心位置、现场风向、风力大小等天气情况综合评判枪的位置、握持力大小、扳机启动时机，一旦子弹射出，子弹的落点位置就不再受枪手控制，这种无反馈的控制系统被称为开环控制系统。开环控制系统的特点是误差比较大，抗干扰能力弱，或者说，为了减小误差，需要进行反复的训练，积累经验。1984年7月29日，许海峰在洛杉矶奥运会上的自选手枪项目中，以566环获得冠军，这个成绩意义非凡，它是中国奥运史上第一枚金牌。许海峰的成功离开刻苦训练、经验积累是不可能的。古时候有卖油翁的例子，卖油翁“取一葫芦置于地，以钱覆其口，徐以杓shao酌油沥之，自钱孔入，而钱不湿”，靠的就是“唯手熟尔”。不管是射击、还是酌油，都是开环控制的例子，不是人人能为之的。"
  },
  {
    "title": "Closed-Loop Control System 闭环系统",
    "title_html": "Closed-Loop Control System 闭环系统",
    "items_html": "<div class=\"slide-item\">A <i>closed-loop control system</i> utilizes an additional measures of the actual output to compare the actual output with the desired output response.</div>\n<div class=\"slide-item\">The measure of the output is called the feedback signal（反馈信号）.</div>\n<div class=\"slide-img\"><img src=\"images/pourwater.jpg\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "如何能克服开环控制系统的缺点，实现对被控对象的准确控制，我们可以构建闭环控制系统。让输出结果反馈到输入端，控制器根据输入输出的比较，调整控制策略，使输出按照预定目标进行。所以闭环系统引入额外的测量手段获得实际的输出信息，然后与期望输出进行比较，两者的差值作为新的输入信息进入到控制系统进行反馈控制以减小偏差。被测输出信息被称为反馈信号。倒茶这个动作就是个典型的闭环控制行为。水杯所处位置、水杯大小等信息作为输入信息输入人的大脑，大脑根据实际水流出的状态控制茶壶的高度、倾角、倾角变化速度等变量，使茶水稳定流出、不喷濺，直到期望的水位为止。"
  },
  {
    "title": "Closed-Loop Control System",
    "title_html": "Closed-Loop Control System",
    "items_html": "<div class=\"slide-item\">A <i>feedback control system</i> is a control system that tends to maintain a prescribed relationship of one system variable to another by comparing functions of these variables and using the difference as a means of control.</div>\n<div class=\"slide-item level-1\"><i>Feedback concept</i>: foundation for control system analysis and design</div>\n<div class=\"slide-img\"><img src=\"images/img_003.png\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "反馈控制系统是能够维持一个系统变量对另一个系统变量之间预定关系的控制系统，具体是通过比较两者之间的差值来实现的，即以偏差校正偏差。反馈的概念是整个控制系统分析与设计的基础。一个完整反馈控制系统通常是由控制器、执行器、被控对象和反馈测量元件等基本元件组成的。"
  },
  {
    "title": "Feedback amplifier 反馈放大器",
    "title_html": "Feedback amplifier 反馈放大器",
    "items_html": "<div class=\"slide-item\">Previous achievements: Lee de Forest （真空三极管发明者）</div>\n<div class=\"slide-img\"><img src=\"images/KRAudio.jpg\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "下面举两个反馈控制的例子。第一个例子是反馈放大器。放大器我们都知道，就是把所接收到的微弱电磁波信号或电信号变成可以接受的水平。提到放大器，首先得从三极管说起。1906年，德福雷斯特制成第一个真空三极管（也称为电子管），但早期真空三极管真空度低，性能不稳定，研究和应用的进展缓慢。直到1912年，来自美国电话电报公司和通用电气公司的两名工程师研制出高真空三极管，才使三极管走上实用阶段。由真空管构成的放大电路即可实现信号放大功能。真空三极管也为计算机的诞生铺平了道路，在世界上第一台电子计算机ENIAC里面，电子管是其最基本的组成元件。"
  },
  {
    "title": "Edwin Howard Armstrong",
    "title_html": "Edwin Howard Armstrong",
    "items_html": "<div class=\"slide-item\">再生电路、超外差电路、超再生电路</div>\n<div class=\"slide-item\">1913年毕业于哥伦比亚大学，研究过三级管并设计反馈电路，后任该校教授。曾前往第一次世界大战的欧洲战场为美军效力。1918年在法国发明了超外差式接收机。1933年，获得了有关频率调制的发明专利权(<em>FM</em>)，频率调制的广播方式解决了无线电收音机的天线和噪音问题。</div>\n<div class=\"slide-img\"><img src=\"images/edwart.jpg\" alt=\"\"></div>",
    "items_count": 3,
    "notes": "反馈放大器发明的另一个关键人物是阿姆斯特朗。阿姆斯特朗发明了“反馈振荡器”和“再生电路”。振荡器的发明，使产生特定频率的无线电波成为可能；而再生电路，利用正反馈原理，使信号的放大能力大大加强，显著提高了接收机的性能。再生电路因其性能好、结构简单，在一战和二战时都曾广泛应用。1918年，阿姆斯特朗又提出了“超外差接收机”，这是一个具有划时代意义的发明，这使得接收机的灵敏度、选择性都大大提高，使商业无线电广播成为可能，并且直到今天，超外差原理仍然广泛应用于各类接收机中。采用正反馈可以在放大器放大倍数不变的情况下，使输出信号与不加正反馈相比时获得更大的放大效果。"
  },
  {
    "title": "Feedback amplifier",
    "title_html": "Feedback amplifier",
    "items_html": "<div class=\"slide-item\">Harold S. Black in 1921, <em>negative feedback amplifier</em></div>\n<div class=\"slide-item\"><i>Objective</i>: Linearing, stabilizing, and improving the amplifiers</div>\n<div class=\"slide-item\"><i>Approach</i>: Feeding systems output back to the input as a method of system control thus helping to eliminate distortion in telecommunications and to extend the frequency range of the amplifier.</div>\n<div class=\"slide-img\"><img src=\"images/ua-741.jpg\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/voltage-transfer-curve.jpg\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/Op-Amp.jpg\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "目前，电子管早已被体积小、能耗低的晶体管替代，并出现了由此形成的集成电路。运算放大器就是一个小的集成电路，在输出端开路情况下，输出电压与差动输入电压的关系曲线可近似用中间这幅图所示的折线来表示。折线中的水平部分称为运放的饱和区，中间部分为线性区，在此区域内输出电压与输入电压成正比，输出电压与输入电压之比称为开环增益或开环电压放大倍数。运算放大器的开环增益一般都很高，通常在十的五次方到十的七次方之间。对信号放大的同时，对噪音也进行了放大。不稳定或“啸叫”常常出现在反馈放大器的试验中。礼堂讲话中，麦克风有时会发出啸叫。早期为了解决长途电话的失真问题，贝尔实验室的Harold Black 工程师发明了负反馈放大器。"
  },
  {
    "title": "Negative feedback amplifier",
    "title_html": "Negative feedback amplifier",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_004.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "将运算放大器的同相输入端接地，反向输入端加信号，则输出信号和输入信号反相，正电压变成了负电压，或是负电压变成了正电压，再将输出信号引到反相输入端，形成负反馈。根据运算放大器虚地、虚短等特性，容易得出该反馈放大器的放大倍数为R2和R1的比值。因此可通过调整两个电阻值的大小按需定制放大倍数，增大运算放大器的线性工作范围，使其工作更稳定，改善其频率特性。"
  },
  {
    "title": "Automobile steering control system",
    "title_html": "Automobile steering control system",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_005.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "第二个例子比较通俗易懂，汽车转向控制系统。对于有人驾驶汽车，驾驶员按照其意愿控制汽车的行驶方向。当然汽车失控后就不能按既定路线行驶了，甚至会发生交通事故。司机控制汽车行驶是一个典型的反馈控制的实例，被控对象是汽车，司机既是控制器（人脑），也是执行器（手），还是反馈信号测量器（眼）。"
  },
  {
    "title": "Automobile steering control system",
    "title_html": "Automobile steering control system",
    "items_html": "<div class=\"slide-img\"><img src=\"images/img_006.png\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/img_007.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "汽车的实际行驶轨迹与预设道路曲线基本吻合。可以用这里显示的方框图进行控制过程表述。司机首先要设定一条期望的行驶轨迹，然后操作方向盘，控制汽车按设定路径行驶，实际的行驶轨迹又反馈给司机本人，司机根据设定路径和实际路径的差值作出下一步操控车辆的决策，进一步控制汽车，完成闭环控制。"
  },
  {
    "title": "Other control system examples",
    "title_html": "Other control system examples",
    "items_html": "<div class=\"slide-item\">Float level regulation 浮球水位调节</div>\n<div class=\"slide-item\">Temperature control (refrigerator, air-conditioner, heater) 温度控制</div>\n<div class=\"slide-item\">Household appliances and automation 家用电器及自动化</div>\n<div class=\"slide-item\">Automation and robots 自动化与机器</div>\n<div class=\"slide-item\">Automobile control and intelligent transportation system (ITS)</div>\n<div class=\"slide-item\">Entertainment 娱乐</div>\n<div class=\"slide-item\">Computer peripherals 计算机外设</div>\n<div class=\"slide-item\">Power industry 电力</div>\n<div class=\"slide-item\">Metallurgical industry 冶金</div>\n<div class=\"slide-item\">Automatic warehousing and inventory control 自动仓储与库存控制</div>\n<div class=\"slide-item\">Biomedical and biological control 生物与生物医学</div>\n<div class=\"slide-item\">Social, economic, and political 社会、经济、政治</div>",
    "items_count": 12,
    "notes": "其他控制系统的例子也有很多，比如浮球水位调节器、冰箱、空调温度控制、家用电器控制等等。我这里列举了很多，就不再一一介绍了。"
  },
  {
    "title": "Advantages of Control Systems 控制系统的优点",
    "title_html": "Advantages of Control Systems 控制系统的优点",
    "items_html": "<div class=\"slide-item\">Power amplification (antenna) 功率放大</div>\n<div class=\"slide-item\">Remote control (robot) 遥控</div>\n<div class=\"slide-item\">Convenience of input form (heater) 方便输入</div>\n<div class=\"slide-item\"><em>Compensation for disturbances</em> (compact disc) 扰动补偿</div>\n<div class=\"slide-item\">Sensitivity reduction (power converter) 降低敏感度（提高抗干扰能力）</div>\n<div class=\"slide-item\"><em>Linearization</em> (microsensor) 线性化</div>\n<div class=\"slide-item\">Performance enhancement (communication system) 性能增强</div>\n<div class=\"slide-item\">Stability augmentation (fighter aircraft) 增稳</div>\n<div class=\"slide-img\"><img src=\"images/cdplayer.jpg\" alt=\"\"></div>",
    "items_count": 9,
    "notes": "控制系统具有很多优点，采用自动化技术不仅可以把人从繁重的体力劳动、部分脑力劳动以及恶劣、危险的工作环境中解放出来，而且能扩展人的器官功能，极大地提高劳动生产率，增强人类认识世界和改造世界的能力。这里列举了一系列具体优点，比如功率放大、遥控、方便输入、扰动补偿等，大多数都比较好理解。这里重点解释一下扰动补偿和线性化。我们以前使用 CD player 播放音乐，不会因为我们行驶在颠簸的路面上而导致音质受损，里面使用了复杂的扰动补偿控制技术。再比如古时候的指南车，不管车往哪个方向行驶，立于车上的木人始终手指初始设定的方向，使用的正是扰动补偿控制技术，其原理我们找机会进行专题介绍。关于线性化，比如计量称重的仪器，在量程范围内，能够准确衡量物体的重量，多个物体的累加重量可以通过分别测量单个物体的重量叠加获得，这是满足线性化的基本条件，即叠加原理。曹冲称象利用的就是线性系统的叠加原理。实际的物理系统并不是线性的，所有元件和系统在不同程度上均具有非线性的性质。但是对于大部分元件和系统来说，当信号或变量变化范围不大或非线性不太严重时，都可以近似地线性化。大多数控制系统可以简化为线性系统，可以将问题简化，使分析更容易。"
  },
  {
    "title": "Brief History of Control",
    "title_html": "Brief History of Control",
    "items_html": "<div class=\"slide-item\">Float regulator mechanism</div>\n<div class=\"slide-item level-1\">The Greeks began engineering feedback systems around 300 BC</div>\n<div class=\"slide-item level-1\">Ktesibios: water clock</div>\n<div class=\"slide-item level-1\">Philon of Byzantium: oil lamp</div>\n<div class=\"slide-item level-1\">Heron of Alexandria: pneumatica</div>\n<div class=\"slide-img\"><img src=\"images/img_008.png\" alt=\"\"></div>",
    "items_count": 6,
    "notes": "控制系统的历史悠久，没有人能确切知道第一个控制系统是什么时候发明的，但我们可以肯定地说，那时它一定没有被认为是一个‘控制系统’。因为控制太自然了，从抽象意义上说，任何一个可以被另一个对象或过程改变的对象或过程都可称之为控制。我们无法确定人类是何时开始有目的地改变（或控制）他所生存的环境。我刚所说的这段话是复述了，1996年 IEEE Control Systems 杂志第 3 期控制历史专辑中的一段话。一般认为，最早的控制系统是公元前300年到公元前1年古希腊人和阿拉伯人发明的水钟中的浮球调节装置，这一原理直至今天仍被广泛应用，如冲水马桶水箱阀门自动启闭即是利用浮球调节原理来实现的。图为水钟使用的浮球调节装置原理，水从漏壶中以恒定的流量注入受水壶，浮在受水壶水面上的漏箭随水面上升指示时间，流量恒定才能保证计时准确，也就是符合线性的特点。为了获得恒定的流量，必须使漏壶的水位保持恒定。当漏壶水位下降时，浮球随之下降，水自动注入漏壶，漏壶水位上升到设定高度时，浮球自动堵住入水口，漏壶水位保持在设定高度。在浮球调节装置这个设计巧妙的控制系统中，传感器、控制器、执行机构是一体的。"
  },
  {
    "title": "Brief History of Control                                       :noexport:",
    "title_html": "Brief History of Control                                       :noexport:",
    "items_html": "<div class=\"slide-item\">Equipments for temple gate O/C and distribution of holy water</div>\n<div class=\"slide-img\"><img src=\"./Figure1-6(c).png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "公元100年左右，亚历山大的希罗发明了开闭庙门和分发圣水的自动装置。神庙门口点火，火烧水产生蒸汽，蒸汽带动其他机械结构，打开庙门。想象一下，两千年前（大约是汉朝？）的人如果看到这么个自动门，估计当即就觉得神仙显灵了，震撼不是一般的。使用者只需从投币口中投入一枚硬币，硬币会掉落到一个连着杠杆的盘子上，盘子倾斜的同时带动了杠杆移动，从而打开阀门使圣水涌出，盘子持续倾斜迫使硬币滑落，最终，盘子、杠杆回到原先位置，阀门关闭，完成一个循环。"
  },
  {
    "title": "都江堰",
    "title_html": "都江堰",
    "items_html": "<div class=\"slide-img\"><img src=\"images/doujy.jpg\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "秦昭王时期，也就是公元前300年，李冰父子主持修筑的都江堰水利工程体现了控制系统观念和工程实践。都江堰主体工程包括鱼嘴分水堤、飞沙堰溢洪道和宝瓶口进水口（图中三个红圈处），被控量为进入成都的水量，枯水期不能少，丰水期不能多，是个多环节控制系统，而且充满各种扰动、不确定性和时变性。"
  },
  {
    "title": "Brief History of Control",
    "title_html": "Brief History of Control",
    "items_html": "<div class=\"slide-item\">Speed control</div>\n<div class=\"slide-item level-1\">Edmund Lee: speed control of windmill</div>\n<div class=\"slide-item level-1\">James Watt: flyball speed governor</div>\n<div class=\"slide-img\"><img src=\"images/img_009.png\" alt=\"\"></div>",
    "items_count": 4,
    "notes": "人们公认的最早应用于工业领域的自动反馈控制器是1769年瓦特发明的飞球调速器（Flyball governor），用于控制蒸汽机输出轴的转速。飞球式调速器被认为是自动控制发展史上的一个里程碑。其工作原理是，轴的转速增加，带动调节器也会加速，导致飞球在离心力作用下其飞行半径增加，通过连杆机构作用使阀门关小，减少蒸汽机的进汽量，使蒸汽机输出轴的转速减小，直至达到设定转速为止。转速的大小，可通过飞球质量或飞球初始飞行半径来调节，飞球质量越大，或者初始飞行半径越大，轴的转速就越高。其实飞球式调速器并不是瓦特最先发明的。关于应用离心力控制速度的研究，科学家惠更斯和胡克都曾钻研过这个问题，并设计了利用离心力控制速度的装置。事实上在蒸汽机之前，离心力调速器已经在风车上被大量应用。"
  },
  {
    "title": "Brief History of Control",
    "title_html": "Brief History of Control",
    "items_html": "<div class=\"slide-item\">In 1868，J.C. Maxwell published &quot;On Governor&quot; (调速器) and proposed concept of feedback control and stability conditions</div>\n<div class=\"slide-item\">In 1884，E.J. Routh (劳斯) proposed the Routh–Hurwitz stability criterion</div>\n<div class=\"slide-item\">In 1892，A.M. Lyapunov (李雅普诺夫) proposed the stability theory</div>\n<div class=\"slide-item\">In 1895，A.Hurwitz (赫尔维茨) proposed the Hurwitz stability criterion</div>\n<div class=\"slide-item\">In 1932，H. Nyquist (提出乃奎斯特) proposed the Nyquist stability criterion（本课程的重点）</div>\n<div class=\"slide-item\">In 1945，H.W. Bode (伯德) proposed the general design methodology of feedback controllers（本课程的重点）</div>",
    "items_count": 6,
    "notes": "19世纪最初的70年，大量的工作围绕改进调速器展开，很多科学家采用性能更好的调速器来开展各自领域的研究工作，世界各地出现了大量调速器方面的专利。1868年，J.C.Maxwell的论文&quot; On Governor&quot;系统地分析了几类调速器并给出了稳定性条件，被认为是第一个系统地分析反馈控制系统的理论研究。1877年，E.J.Routh得到特征方程所有根都有负实部的多项式系数稳定条件，Adolf Hurwitz 1895 年也独立地推出了这个判据，因而并称 Routh-Hurwitz 判据。上世纪30年代以后，相继出现了乃氏稳定判据和波德图这两个重要的分析工具，它们也是本门课程的重点和难点。"
  },
  {
    "title": "PID 控制",
    "title_html": "PID 控制",
    "items_html": "<div class=\"slide-img\"><img src=\"images/pidcontrol.png\" alt=\"\"></div>",
    "items_count": 1,
    "notes": "19 世纪后半叶到上世纪初, 反馈控制器被大量应用，包括电压、电流与频率的调节、蒸汽发电中的锅炉控制、电机的速度控制、船与飞行器的驾驶与稳定控制，工业实践中的温度、压力与流量控制等。1911年，Elmer Sperry发明带有PID控制的船的自动驾驶仪，1922年, Nicholas Minorsky通过分析船的自动驾驶问题, 推导出了我们现在所称的PID控制器的控制器形式。PID是迄今为止应用最广泛的一种控制方法，目前95\\%以上的过程控制回路和90\\%以上航空航天控制回路还都是基于 PID 控制。直到1940年以前，在绝大部分场合，控制系统设计仍是一门艺术或手艺，采用的是“试错法”。虽然 PID只有三个参数，但PID调参方法已有上千种，都是经验公式，而工程界依然认为大部分PID控制回路并没有调整在好的工作状态。第二次世界大战期间，反馈控制方法被广泛用于设计研制飞机自动驾驶仪、火炮定位系统、雷达天线控制系统以及其他军用系统。这些系统的复杂性和对快速跟踪、精确控制的高性能追求，迫切要求拓展已有的控制技术。第二次世界大战结束时，经典控制技术和理论已基本建立。"
  },
  {
    "title": "Classic and Modern Control Theories",
    "title_html": "Classic and Modern Control Theories",
    "items_html": "<div class=\"slide-item\">In 1948，N. Wiener published ``Cybernetics&#x27;&#x27; (控制论)，a symbol of the basic formation of the classic control theory</div>\n<div class=\"slide-img\"><img src=\"images/mordercontrol.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "1948年维纳为他的学说取名 Cybernetics，就是为了向 Maxwell的 On Governor论文致敬，因为 Cybernetics和Governor的希腊文和拉丁文是同一个含义。这标志经典控制理论的基本形成；经典控制理论以传递函数为基础，主要研究单输入-单输出系统的分析和控制问题。到20世纪50年代，经典控制理论发展到相当成熟的地步，形成了相对完整的理论体系，为指导当时的控制工程实践发挥了极大的作用，构成了现代控制理论的重要基础。以经典控制理论为基础形成的现代控制理论主要包括，非线性系统理论、自适应控制理论、模糊控制、鲁棒控制、智能控制、随机控制等，主要采用状态空间法进行研究。"
  },
  {
    "title": "Classic Control Theory",
    "title_html": "Classic Control Theory",
    "items_html": "<div class=\"slide-item\">1954年，钱学森出版了英文版《工程控制论》，首先把控制理论推广到工程技术领域。</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-7.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "1954年，钱学森出版了英文版的《工程控制轮》，首先把控制理论推广到工程技术领域。作为技术科学的控制论，对工程、生物、生命、经济、科学以及社会研究都有深刻的意义，比起相对论和量子论对社会的作用有过之而无不及。我们可以毫不含糊地说从科学理论的角度来看，二十世纪上半叶的三大伟绩是相对论、量子论和控制论，也许可以称他们为三项科学革命，是人类认识客观世界的三大飞跃。"
  },
  {
    "title": "Modern Products of Control Systems",
    "title_html": "Modern Products of Control Systems",
    "items_html": "<div class=\"slide-item\">Sputnik, Apollo Program and Space Shuttle</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-8.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "这三张图代表了三个历史性事件。一是苏联在1957年10月4日成功发射了世界第一颗人造地球卫星``斯普特尼克1号&#x27;&#x27;；二是1969年7月20日美国阿波罗11号将三名宇航员送到月球，宇航员阿姆斯特朗迈出了人类在月球上的第一步，三是美国在1981年4月12日首次发射了世界第一架航天飞机哥伦比亚号。这些都是控制系统应用的杰出代表。"
  },
  {
    "title": "Modern Products of Control Systems",
    "title_html": "Modern Products of Control Systems",
    "items_html": "<div class=\"slide-item\">Mars rover: Spirit(勇气号), Opportunity(机遇号), Curiosity(好奇号), Perseverance(毅力号), Zhu Rong(祝融号)</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-9.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "此外，世界各国总共向火星发射了30多个探测器，但只有不到三分之一成功抵达了火星。``机遇号&#x27;&#x27;和``勇气号&#x27;&#x27;火星车是火星漫步者计划中的``双胞胎&#x27;&#x27;探测器。功勋卓著的``勇气号&#x27;&#x27;2004年1月4日在火星着陆，最初的设计寿命只有短短的90天，然而勇气号一直工作到了2009年6月的某一天，从此``勇气号&#x27;&#x27;转化为了一个静止观测平台，并顽强的继续工作到了2011年5月25号。北京时间2021年 5 月 15 日，中国首辆火星车 “祝融” 号与着陆器成功登陆火星，寿命约相当于92个地球日。祝融在我国传统神话中是火神，在史书里记载祝融是一个负责管火的官职。我国成为继苏联、美国后第三个真正“踏上”（成功着陆）火星的国家，也是首次火星探测即实现着陆的国家。"
  },
  {
    "title": "Modern Products of Control Systems",
    "title_html": "Modern Products of Control Systems",
    "items_html": "<div class=\"slide-item\">James Webb Space Telescope</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-10.jpg\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "韦伯太空望远镜是美国航空航天局、欧洲航天局和加拿大航空航天局联合研发的红外线观测用太空望远镜，为哈勃空间望远镜的继任者，号称鸽王，耗资100亿美元。韦伯望远镜本应在2007年发射，初始预算5亿美元。质量为6.2吨，约为哈勃空间望远镜（11吨）的一半。主反射镜由铍制成，口径达到6.5米，面积为哈勃太空望远镜的5倍以上。它能在近红外波段工作、在接近绝对零度的环境中运行。2021年12月25日在法属圭亚那库鲁基地成功发射升空。"
  },
  {
    "title": "Modern Products of Control Systems",
    "title_html": "Modern Products of Control Systems",
    "items_html": "<div class=\"slide-item\">The jewellery in the crown of industry 工业皇冠上的明珠</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-11.jpg\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "航空发动机因其技术跨度广、研发周期长，资金需求大，而被称为现代工业“皇冠上的明珠”。航空发动机要在高温高压下工作，同时保持高转速和持久的高可靠性，从而成为人类历史上最复杂最精密的工业产品。发动机健康管理（EHM）技术是在传统发动机状态监视、故障诊断的基础上，综合利用信息融合技术、人工智能技术研究产生的一种新发动机管理方案，是航空发动机故障诊断技术的必然发展趋势之一，其中发动机振动监测及故障诊断是EHM技术的重要组成内容。马航MH370失联后，美国航空调查人员和国家安全人员认为MH370航班发回的发动机数据显示其至少工作了5小时。"
  },
  {
    "title": "Modern Products of Control Systems",
    "title_html": "Modern Products of Control Systems",
    "items_html": "<div class=\"slide-item\">CNC machines</div>\n<div class=\"slide-img\"><img src=\"images/Figure1-12.jpg\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "数控机床很好地解决了复杂、精密、小批量、多品种的零件加工问题，是一种柔性、高效能的自动化机床。数控机床作为高端制造的“工业母机”，是高端制造业的基础，生产高端设备的高端设备。CNC系统是一种位置控制系统，它是根据输入数据插补出理想的运动轨迹，然后输出到执行部件加工出所需要的零件。因此，数控装置主要由输入、处理和输出三个基本部分构成。"
  },
  {
    "title": "The Future Evolution of Control Systems",
    "title_html": "The Future Evolution of Control Systems",
    "items_html": "<div class=\"slide-item\">Goal of control systems: provides extensive flexibility and a high level of automony.</div>\n<div class=\"slide-img\"><img src=\"images/img_010.png\" alt=\"\"></div>",
    "items_count": 2,
    "notes": "刚性自动化（Fixed Automation）主要设计用于反复高效地生产单个产品。过去，往往只生产一种或有限种类的产品，而且产量很大、变化很小，因此这种模式在生产车间运行良好。随后出现了下一代自动化——可编程自动化（Programmable Automation），旨在实现安装实施后允许某种程度的可配置性。这包括编写新的代码来执行新运营的能力，当然这需要手动操作机械装置来进行转换。更现代的方法是柔性自动化（Flexible Automation），设备操作人员按下按钮，就可以利用配方控制和机械自动化无缝地将一个进程转换到另一个。这使制造商能够在同一台机器上生产更多的产品。一旦刚性自动化系统中的任何产品出现变化，该系统就变得极低效。相反，在柔性自动化系统中，随着产品组合的增加，一旦制定了合适的组合，就可以获得最优的解决方案，因此柔性自动化则变得更具成本效益。"
  },
  {
    "title": "Summary",
    "title_html": "Summary",
    "items_html": "<div class=\"slide-item\">A control system</div>\n<div class=\"slide-item level-1\">Consisting of interconnected components</div>\n<div class=\"slide-item level-1\">Designed to achieve a desired purpose</div>\n<div class=\"slide-item\">Control systems can be open-loop or closed-loop</div>\n<div class=\"slide-item\">The use of feedback (conceptually or pragramatically) is important</div>\n<div class=\"slide-item\">Control system design is essentially an iterative process</div>\n<div class=\"slide-item\">Knowledge of feedback and control is essential in many engineering disciplines</div>",
    "items_count": 7,
    "notes": "总结一下这一章的内容，控制系统是由相互联系的构件组成，以获得期望的目标输出，控制系统可以是开环，也可以是闭环。控制系统中反馈的概念非常重要，而且控制系统的设计通常需要迭代进行。反馈和控制的相关知识在许多工程学科中都很重要，作为工科学生一定要打好这方面的基础。"
  },
  {
    "title": "Chapter 2 Contents",
    "title_html": "Chapter 2 Contents",
    "items_html": "<div class=\"slide-item\">Introduction</div>\n<div class=\"slide-item\">Differential equations of physical systems 物理系统微分方程</div>\n<div class=\"slide-item\">Linear approximation of physical systems 线性化</div>\n<div class=\"slide-item\">The Laplace transform 拉氏变换</div>\n<div class=\"slide-item\">The transfer function of linear systems <span style=\"color:blue\">传递函数</span></div>\n<div class=\"slide-item\">Block diagram models <span style=\"color:blue\">方框图模型</span></div>\n<div class=\"slide-item\">Signal-flow graph models <span style=\"color:blue\">信号流图</span></div>\n<div class=\"slide-item\">Summary</div>",
    "items_count": 8,
    "notes": "本章的内容涵盖物理系统的微分方程建模，系统模型的线性化，工程数学中曾经学过的拉氏变换，这三部分内容是前期学过各门课的基础，主要来自物理和高数。后面这三部分内容，传递函数、方框图模型和信号流图，是本门课程新涉及的内容。要求大家掌握拉氏变换在定义传递函数中的作用，能够应用方框图及信号流图分析复杂系统的传递函数，深刻理解物理建模在控制系统设计分析中所起的重要作用。"
  },
  {
    "title": "Approach to Dynamics System Problems",
    "title_html": "Approach to Dynamics System Problems",
    "items_html": "<div class=\"slide-item\">Define the system and its components 定义系统及组件</div>\n<div class=\"slide-item\">Formulate the mathematical model and list the necessary assumptions 基于必要假设列数学模型</div>\n<div class=\"slide-item\">Write the differential equations describing the model 建立描述模型的微分方程</div>\n<div class=\"slide-item\">Solve the equations for the desired output variables 解方程，得到输出变量</div>\n<div class=\"slide-item\">Examine the solutions and the assumptions 检验假设及解的合理性</div>\n<div class=\"slide-item\">If necessary, reanalyze or redesign the system  再分析及再设计</div>",
    "items_count": 6,
    "notes": "求解动态系统问题的方法，首先要定义系统及其构成组件，然后进行必要的简化和假设，确立系统的数学模型，通常使用微分方程对系统进行描述，接下来用数值或解析的方法求解微分方程，获得系统的期望输出变量，最后检验解及假设的合理性与准确性，如有必要，还需要进行再分析或再设计。"
  },
  {
    "title": "Differential Equations of Physical Systems",
    "title_html": "Differential Equations of Physical Systems",
    "items_html": "<div class=\"slide-item\">Differential equations 微分方程</div>\n<div class=\"slide-item level-2\">Used to represent the behavior of dynamic systems 用于动态系统的行为表征</div>\n<div class=\"slide-item level-2\">Obtained by utilizing the physical laws of the process 基于被控过程的物理定律建立</div>\n<div class=\"slide-item\"><i>Modeling</i>: applicable to mechanical, electrical, fluid, and themodynamic systems 微分方程建模方法适用于力学、电学、流体及热力学系统</div>\n<div class=\"slide-item\"><i>Modeling approach</i>:</div>\n<div class=\"slide-item level-2\">Governing equation 控制方程</div>\n<div class=\"slide-item level-2\">Characteristics of the components (elements) 构成元件特点</div>\n<div class=\"slide-item level-2\">Characteristics of the signals (variables)  信号（或变量）特点</div>",
    "items_count": 8,
    "notes": "微分方程是研究客观世界强有力的数学工具，至今已有三百多年的发展历史。1846年勒维耶利用微分方程预见了海王星的存在及其准确位置，如今微分方程在自动控制、弹道设计、飞行稳定控制等许多领域都有应用。我们这门课里，主要应用微分方程表征动态系统的行为，通常来说，可以基于我们熟悉的物理定律建立控制系统相应的数学模型，包括力学、电学、流体及热力学等系统。建模方法可以直接应用控制方程进行描述，比如用牛顿第二定律描述物体的运动行为，也可以基于构成组件的特点综合分析，比如汽车即可视为由质量、弹簧、阻尼构成的机械系统，或者是根据输入输出系统的信号特征建立模型。这些方法将在后续各章进行介绍。"
  },
  {
    "title": "Characteristics of Variables 变量特征",
    "title_html": "Characteristics of Variables 变量特征",
    "items_html": "<div class=\"slide-item\">The variables (signals) can either be <em>through-variables</em> or <em>across variables</em></div>\n<div class=\"slide-item\">Through-variables 通过型变量</div>\n<div class=\"slide-item level-1\">Force 力</div>\n<div class=\"slide-item level-1\">Torque 扭矩</div>\n<div class=\"slide-item level-1\">Current 电流</div>\n<div class=\"slide-item level-1\">Fluid volumetric flow rate 水流率</div>\n<div class=\"slide-item level-1\">Heat flow rate 热流率</div>\n<div class=\"slide-item\">Across variables 跨越型变量</div>\n<div class=\"slide-item level-1\">Translational velocity 平移速度</div>\n<div class=\"slide-item level-1\">Angular velocity 角速度</div>\n<div class=\"slide-item level-1\">Voltage 电压</div>\n<div class=\"slide-item level-1\">Pressure 水压</div>\n<div class=\"slide-item level-1\">Temperature 温度</div>",
    "items_count": 13,
    "notes": "根据变量的不同特征，可将其分为通过型变量和跨越型变量，以最熟悉的电流及电压来说明两者的区别。电流通过导体，属于连续流通的状态，因此属于通过型变量；电压一般施加在负载比如电阻的两端，经过负载后，一般都有压降，具有不连续的特点，因此属于跨越型变量。以此类推出其他通过型及跨越型的变量。两种变量既可以是原因，也可以是结果。电阻回路中，跨越型变量电压是原因，通过型变量电流是结果，在质量系统中，通过型变量力是原因，跨越型变量速度是结果，因为力是改变运动状态的原因。判断属于哪一种变量，主要看经过系统后是否连续，还是有变化。"
  },
  {
    "title": "Characteristics of Elements 元件特征",
    "title_html": "Characteristics of Elements 元件特征",
    "items_html": "<div class=\"slide-item\">Inductive storage 感性储能元件</div>\n<div class=\"slide-item level-1\">Inductance 电感</div>\n<div class=\"slide-item level-1\">Translational or rotational spring 弹簧</div>\n<div class=\"slide-item level-1\">Fluid inertia 流体惯量</div>\n<div class=\"slide-item\">Capacitive storage 容性储能元件</div>\n<div class=\"slide-item level-1\">Capacitance 电容</div>\n<div class=\"slide-item level-1\">Mass 质量 （平动）</div>\n<div class=\"slide-item level-1\">Moment of inertia 转动惯量</div>\n<div class=\"slide-item level-1\">Fluid capacitance 流体容量</div>\n<div class=\"slide-item level-1\">Thermal capacitance 热容量</div>\n<div class=\"slide-item\">Energy dissipators 耗能元件</div>\n<div class=\"slide-item level-1\">Resistance 电阻</div>\n<div class=\"slide-item level-1\">Viscous friction 粘阻</div>\n<div class=\"slide-item level-1\">Fluid resistance 流阻</div>\n<div class=\"slide-item level-1\">Thermal resistance 热阻</div>\n<div class=\"slide-img\"><img src=\"images/rlc.jpg\" alt=\"\"></div>\n<div class=\"slide-img\"><img src=\"images/msd.png\" alt=\"\"></div>",
    "items_count": 17,
    "notes": "根据构成系统元件的特征，可分为感性储能元件，容性储能元件及耗能元件。比如我们以前学过的RLC电路，就是由电容、电感和电阻构成的电路系统，能起到滤波、振荡调频的作用。再比如，质量、弹簧、阻尼元件构成的质量弹簧阻尼系统可以用于描述很多实际应用的机械产品，如汽车。"
  },

    "title": "Through and Across Variables",
    "title_html": "Through and Across Variables",
    "items_html": "",
    "items_count": 0,
    "notes": "这张表列出了电学、机械、流体、热学中的通过型变量和跨越型变量，电流对应电压，力对应速度，流速对应压力，热流对应温度。这些变量要非常熟悉，后续内容中会经常涉及。"
