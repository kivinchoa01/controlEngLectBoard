const TOC = [{"title": "Introduction to Control Systems", "slide_index": 0}, {"title": "Mathematical Models of Systems", "slide_index": 33}, {"title": "Feedback Control System Characteristics", "slide_index": 125}, {"title": "The Performance of Feedback Control Systems", "slide_index": 169}, {"title": "The Stability of Linear Feedback Systems", "slide_index": 228}, {"title": "Frequency Response Methods", "slide_index": 253}, {"title": "Stability in the Frequency Domain", "slide_index": 314}, {"title": "Footnotes", "slide_index": 378}];

let curPage = 0;
let curStep = 0;
let maxStep = 0;

function renderMath(el) {
  if (typeof katex === 'undefined') return;
  // 找到所有 class="math" 的内联公式
  el.querySelectorAll('.math').forEach(function(m) {
    try {
      var html = katex.renderToString(m.textContent, {displayMode: false, throwOnError: false});
      m.innerHTML = html;
    } catch(e) {}
  });
  // 找到所有 class="math-block" 的显示公式
  el.querySelectorAll('.math-block').forEach(function(m) {
    try {
      var html = katex.renderToString(m.textContent, {displayMode: true, throwOnError: false});
      m.innerHTML = html;
    } catch(e) {}
  });
}

function renderPage() {
  var s = SLIDES[curPage];
  document.getElementById('slideTitle').innerHTML = s.title_html;
  renderMath(document.getElementById('slideTitle'));
  document.getElementById('pageCur').textContent = curPage + 1;
  document.getElementById('pageTotal').textContent = SLIDES.length;

  var container = document.getElementById('slideItems');
  container.innerHTML = s.items_html;
  document.getElementById('emptySlide').style.display = s.items_html.trim() ? 'none' : 'block';

  // 渲染该页的数学公式
  renderMath(container);

  maxStep = s.items_count;
  curStep = 0;
  container.querySelectorAll('.slide-item, .img-placeholder, .slide-img').forEach(function(el) {
    el.classList.remove('show');
  });
  document.getElementById('notesText').innerHTML = s.notes || '(无)';
  renderMath(document.getElementById('notesText'));
  if (penActive) { setTimeout(function() { resizeCanvas(true); }, 0); }

  document.getElementById('hintText').textContent =
    maxStep > 0 ? '步骤 0 / ' + maxStep : '本页无逐步内容';
}

function advance() {
  if (curStep >= maxStep) {
    if (curPage < SLIDES.length - 1) { nextPage(); }
    return;
  }
  var items = document.querySelectorAll('#slideItems .slide-item, #slideItems .img-placeholder, #slideItems .slide-img');
  if (items[curStep]) {
    items[curStep].classList.add('show');
  }
  curStep++;
  document.getElementById('hintText').textContent = '步骤 ' + curStep + ' / ' + maxStep;
}

function nextPage() {
  if (curPage < SLIDES.length - 1) { curPage++; renderPage(); }
}
function nextPageAll() {
  if (curPage < SLIDES.length - 1) { curPage++; renderPage(); revealAll(); }
}
function revealAll() {
  var items = document.querySelectorAll('#slideItems .slide-item, #slideItems .img-placeholder, #slideItems .slide-img');
  items.forEach(function(el) { el.classList.add('show'); });
  curStep = maxStep;
  document.getElementById('hintText').textContent = maxStep > 0 ? '步骤 ' + curStep + ' / ' + maxStep : '本页无逐步内容';
}
function doNextPage() {
  if (document.getElementById('showAllCheck').checked) { nextPageAll(); }
  else { nextPage(); }
}
function prevPage() {
  if (curPage > 0) { curPage--; renderPage(); revealAll(); }
}
function toggleNotes() {
  var cb = document.getElementById('readNotesCheck');
  if (cb && cb.checked) {
    // 朗读模式：不显示面板，用语音合成朗读讲课词
    var temp = document.createElement('div');
    temp.innerHTML = SLIDES[curPage].notes;
    var text = temp.textContent.replace(/@@MATH_\d+@@/g, '').trim();
    if (text) {
      window.speechSynthesis.cancel();
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = parseFloat(document.getElementById('speechRate').value) || 1;
      var sel = document.getElementById('voiceSelect');
      if (sel.value) {
        var voices = window.speechSynthesis.getVoices();
        var idx = parseInt(sel.value);
        if (voices[idx]) utter.voice = voices[idx];
      }
      window.speechSynthesis.speak(utter);
    }
    return;
  }
  document.getElementById('notesPanel').classList.toggle('open');
}

function populateVoices() {
  var sel = document.getElementById('voiceSelect');
  if (!sel) return;
  var currentVal = sel.value;
  sel.innerHTML = '<option value="">默认语音</option>';
  var voices = window.speechSynthesis.getVoices();
  // 中文语音排在前面
  var cnVoices = [], otherVoices = [];
  voices.forEach(function(v, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + ' (' + v.lang + ')';
    if (v.lang && v.lang.startsWith('zh')) cnVoices.push(opt);
    else otherVoices.push(opt);
  });
  cnVoices.concat(otherVoices).forEach(function(opt) { sel.appendChild(opt); });
  sel.value = currentVal;
}

function renderToc() {
  var html = '';
  for (var ci = 0; ci < TOC.length; ci++) {
    var ch = TOC[ci];
    var endIdx = (ci + 1 < TOC.length) ? TOC[ci + 1].slide_index : SLIDES.length;
    html += '<div class="toc-chapter" onclick="event.stopPropagation();jumpToSlide(' + ch.slide_index + ')">' + escHtml(ch.title) + '</div>';
    for (var si = ch.slide_index; si < endIdx; si++) {
      var s = SLIDES[si];
      html += '<div class="toc-slide" onclick="event.stopPropagation();jumpToSlide(' + si + ')">' + escHtml(s.title || '(无标题)') + '</div>';
    }
  }
  document.getElementById('tocContent').innerHTML = html;
}
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function toggleToc() {
  var panel = document.getElementById('tocPanel');
  var opening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  if (opening) renderToc();
}
function jumpToSlide(idx) {
  curPage = idx;
  document.getElementById('tocPanel').classList.remove('open');
  renderPage();
  revealAll();
}

function jumpToPage() {
  var n = parseInt(document.getElementById('pageJump').value);
  if (!isNaN(n) && n >= 1 && n <= SLIDES.length) {
    curPage = n - 1;
    renderPage();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); advance(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); doNextPage(); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); prevPage(); }
  if (e.code === 'KeyN') { e.preventDefault(); toggleNotes(); }
  if (e.code === 'KeyT') { e.preventDefault(); toggleToc(); }
  if (e.code === 'KeyP') { e.preventDefault(); togglePen(); }
  if (e.code === 'KeyG') {
    e.preventDefault();
    var inp = document.getElementById('pageJump');
    inp.focus(); inp.select();
  }
});
document.getElementById('board').addEventListener('click', function(e) {
  if (e.target.closest('.controls')) return;
  if (e.target.closest('#drawCanvas')) return;
  advance();
});

// ========== 语音朗读 ==========
if (window.speechSynthesis) {
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = populateVoices;
  }
  // Chrome 需要异步触发
  setTimeout(populateVoices, 200);
}

// 语速滑块：显示当前值，松开时吸附到 1.0
document.getElementById('speechRate').addEventListener('input', function() {
  document.getElementById('rateVal').textContent = this.value;
});

// ========== 画笔工具 ==========
var canvas = document.getElementById('drawCanvas');
var ctx = canvas.getContext('2d');
var penActive = false;
var penDrawing = false;
var penColor = '#e8c840';
var penWidthVal = 3;
var savedStrokes = [];
var bufW = 0, bufH = 0;  // canvas buffer (physical pixels)
var refW = 0, refH = 0;  // CSS dimensions at first draw (fixed reference)

function boardCSS() {
  var el = document.querySelector('.board-scroll');
  return { w: el.clientWidth, h: Math.max(el.clientHeight, el.scrollHeight) };
}
function resizeCanvas(force) {
  var css = boardCSS();
  var dpr = window.devicePixelRatio || 1;
  var newBufW = Math.round(css.w * dpr);
  var newBufH = Math.round(css.h * dpr);
  // On first call or real window resize: rebuild buffer
  if (force || newBufW !== bufW || newBufH !== bufH) {
    bufW = newBufW; bufH = newBufH;
    if (!refW) { refW = css.w; refH = css.h; }
    canvas.width = bufW;
    canvas.height = bufH;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    savedStrokes.forEach(function(stroke) { drawStroke(stroke); });
  }
  // Always update CSS size (handles zoom: browser auto-scales the buffer)
  canvas.style.width = css.w + 'px';
  canvas.style.height = css.h + 'px';
}
function drawStroke(stroke) {
  if (stroke.points.length < 1) return;
  ctx.beginPath();
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.width * Math.min(refW, refH);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(stroke.points[0][0] * refW, stroke.points[0][1] * refH);
  for (var pi = 1; pi < stroke.points.length; pi++) {
    ctx.lineTo(stroke.points[pi][0] * refW, stroke.points[pi][1] * refH);
  }
  ctx.stroke();
}

function togglePen() {
  penActive = !penActive;
  canvas.classList.toggle('active', penActive);
  document.getElementById('penToggle').classList.toggle('active', penActive);
  if (penActive) resizeCanvas(true);
}

function setPenColor(color) {
  penColor = color;
  document.querySelectorAll('.pen-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.color === color);
  });
}

function setPenWidth(w) { penWidthVal = parseInt(w); }

function clearCanvas() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  savedStrokes = [];
}

function getCanvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  var scrollEl = document.querySelector('.board-scroll');
  return [e.clientX - rect.left, e.clientY - rect.top + scrollEl.scrollTop];
}

canvas.addEventListener('pointerdown', function(e) {
  if (!penActive) return;
  e.preventDefault();
  penDrawing = true;
  var pos = getCanvasPos(e);
  var stroke = { color: penColor, width: penWidthVal / Math.min(refW, refH), points: [[pos[0] / refW, pos[1] / refH]] };
  savedStrokes.push(stroke);
  ctx.beginPath();
  ctx.strokeStyle = penColor;
  ctx.lineWidth = penWidthVal;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(pos[0], pos[1]);
});

canvas.addEventListener('pointermove', function(e) {
  if (!penActive || !penDrawing) return;
  e.preventDefault();
  var pos = getCanvasPos(e);
  var stroke = savedStrokes[savedStrokes.length - 1];
  stroke.points.push([pos[0] / refW, pos[1] / refH]);
  ctx.lineTo(pos[0], pos[1]);
  ctx.stroke();
});

canvas.addEventListener('pointerup', function(e) { penDrawing = false; });
canvas.addEventListener('pointerleave', function(e) { penDrawing = false; });

window.addEventListener('resize', resizeCanvas);
document.querySelector('.board-scroll').addEventListener('scroll', function() {
  if (penActive) resizeCanvas();
});

renderPage();
</script>
